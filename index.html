                    this.orbitalAngle += 0.3;
                    this.r = CLASSES[this.classKey].r + Math.abs(Math.sin(this.tick * 0.2) * 15);
                    this.y += Math.sin(this.tick * 0.5) * 8;
                    this.vx *= 0.9; this.vy *= 0.9;
                    this.x += this.vx; this.y += this.vy;
                    return;
                }

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 12) this.trail.shift();

                // Smooth Visual Rotations (LERP)
                if (enemy) {
                    let targetAng = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                    let diff = targetAng - this.visualWeaponAngle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.visualWeaponAngle += diff * 0.15;

                    let eDiff = targetAng - this.visualEyeAngle;
                    while (eDiff < -Math.PI) eDiff += Math.PI * 2;
                    while (eDiff > Math.PI) eDiff -= Math.PI * 2;
                    this.visualEyeAngle += eDiff * 0.25;
                }
                let targetScale = 1.0 + Math.sin(Date.now() * 0.005) * 0.03;
                this.visualScale += (targetScale - this.visualScale) * 0.1;

                // === MINEFIELD LOGIC ===
                if (this.mineState) {
                    if (this.mineState !== 'done') {
                        this.vx = 0; this.vy = 0;
                    }
                    this.mineTick++;

                    if (this.mineState === 'active') {
                        if (this.mineTick % 8 === 0 && this.mineTick < 140 && enemy) {
                            // Lay mines in a ring AROUND the enemy so they're surrounded
                            let angle = rand(0, Math.PI * 2);
                            let dist = rand(60, 180);
                            let mx = enemy.x + Math.cos(angle) * dist;
                            let my = enemy.y + Math.sin(angle) * dist;
                            mx = Math.max(30, Math.min(canvas.width - 30, mx));
                            my = Math.max(30, Math.min(canvas.height - 30, my));
                            projectiles.push(new Projectile(mx, my, 0, 0, 'landmine', this, 0));
                            particles.push(new Particle(mx, my, '#ff0000', 0, 20, 8, true, 'circle'));
                            triggerShake(2);
                        }

                        // Boomer shoves enemy with shockwaves pushing them INTO the mines!
                        if (this.mineTick === 80 && enemy) {
                            actionWords.push(new ActionWord(this.x, this.y, "GET OVER THERE!", 1.5));
                            let ang = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                            enemy.vx += Math.cos(ang) * 20;
                            enemy.vy += Math.sin(ang) * 20;
                            triggerShake(15);
                        }
                        if (this.mineTick === 130 && enemy) {
                            actionWords.push(new ActionWord(this.x, this.y, "BOOM!", 1.5));
                            let ang = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                            enemy.vx += Math.cos(ang) * 25;
                            enemy.vy += Math.sin(ang) * 25;
                            triggerShake(15);
                        }

                        if (this.mineTick === 160) {
                            actionWords.push(new ActionWord(canvas.width / 2, canvas.height / 2, "WATCH YOUR STEP!", 2.0));
                        }

                        if (this.mineTick === 200) {
                            this.mineState = 'closing';
                            this.mineTick = 0;
                        }
                    } else if (this.mineState === 'closing') {
                        this.mineTick++;

                        // ALL mines slowly creep toward the enemy — nowhere to hide!
                        if (enemy) {
                            projectiles.forEach(p => {
                                if (p.type === 'landmine' && p.active) {
                                    let ang = Math.atan2(enemy.y - p.y, enemy.x - p.x);
                                    let speed = 1.5 + this.mineTick * 0.03; // Accelerate over time
                                    p.x += Math.cos(ang) * speed;
                                    p.y += Math.sin(ang) * speed;
                                }
                            });
                        }

                        // Shake intensifies as mines close in
                        if (this.mineTick % 15 === 0) triggerShake(2 + this.mineTick / 20);

                        if (this.mineTick === 60) {
                            actionWords.push(new ActionWord(canvas.width / 2, canvas.height / 2, "INCOMING!", 2.0));
                        }

                        // After 3 seconds, detonate ALL remaining mines on enemy
                        if (this.mineTick >= 180) {
                            this.mineState = 'results';
                            this.mineTick = 0;

                            if (enemy) {
                                let mineCount = 0;
                                projectiles.forEach(p => {
                                    if (p.type === 'landmine' && p.active) {
                                        mineCount++;
                                        createExplosion(p.x, p.y, '#ff6600', 40, 2.0);
                                        p.active = false;
                                    }
                                });
                                // Chain explosion damage scales with how many mines are left
                                let totalDmg = Math.min(200, 15 * mineCount);
                                enemy.takeDamage(totalDmg, "MINEFIELD");
                                actionWords.push(new ActionWord(enemy.x, enemy.y, "TOTAL ANNIHILATION!", 3.0));
                                createExplosion(enemy.x, enemy.y, '#ff6600', 200, 6.0);
                                let sw = new Shockwave(enemy.x, enemy.y, '#ff6600', 500, 0, this);
                                sw.hitFlag = true; shockwaves.push(sw);
                                triggerShake(80); flashScreen();

                                setTimeout(() => { if (enemy) { createExplosion(enemy.x + rand(-60, 60), enemy.y + rand(-60, 60), '#ffcc00', 120, 4.0); triggerShake(30); } }, 300);

                // === FINAL ROUND (BRAWLER DOMAIN) LOGIC ===
                if (this.brawlState) {

                // === HIGH NOON (GUNSLINGER DOMAIN) LOGIC ===
                if (this.highNoonState) {
                    if (this.highNoonState !== 'done') {

                        if (enemy) { enemy.vx = 0; enemy.vy = 0; }

                    this.highNoonTick++;

                    if (this.highNoonState === 'active') {

                    } else if (this.highNoonState === 'countdown') {
                        if (this.highNoonTick === 30 || this.highNoonTick === 90) {

                    } else if (this.highNoonState === 'draw') {

                            hitStopFrames = 30;
                            triggerShake(60);

                            if (enemy) {
                                enemy.takeDamage(150, "DEATH SHOT");

                    if (this.fanCooldown <= 0) {

                        this.fanCooldown = 5;

                        if (this.electionTick % 20 === 0 && this.electionTick < 180) {

                    if (this.dragRaceState === 'racing') {

                        if (enemy) enemy.x = trackStart + (enemy.dragRaceProgress / 100) * trackLen;

                        // Exhaust particles
                        if (this.dragRaceTick % 2 === 0) {
                            particles.push(new Particle(this.x - 25, this.y, '#ff6600', rand(4, 10), 15, rand(4, 7), false, 'square'));
                            particles.push(new Particle(this.x - 25, this.y, '#aaa', rand(2, 6), 25, rand(6, 10), false, 'circle'));
                            if (enemy) {
                                particles.push(new Particle(enemy.x - 15, enemy.y, '#aaa', rand(2, 5), 20, rand(4, 8), false, 'circle'));
                            }
                        }

                        // Screen rumble while racing
                        triggerShake(1 + this.dragRaceProgress / 30);

                        // Dramatic moments
                        if (this.dragRaceProgress > 50 && this.dragRaceProgress < 55) {
                            actionWords.push(new ActionWord(this.x, this.y - 30, "NITRO!", 1.5));
                            this.dragRaceProgress += 5; // Nitro boost!
                        }

                        // Check finish
                        let finishLine = 100;
                        if (this.dragRaceProgress >= finishLine || (enemy && enemy.dragRaceProgress >= finishLine)) {
                            this.dragRaceState = 'finish';
                            this.dragRaceTick = 0;
                        }
                    }

                    if (this.dragRaceState === 'finish') {
                        if (this.dragRaceTick === 1) {
                            hitStopFrames = 25;
                            let winner, loser;
                            if (this.dragRaceProgress >= (enemy ? enemy.dragRaceProgress : 0)) {
                                winner = this; loser = enemy;
                            } else {
                                winner = enemy; loser = this;
                            }
                            if (winner && loser) {
                                let gap = Math.abs(this.dragRaceProgress - (enemy ? enemy.dragRaceProgress : 0));
                                let dmg = 40 + Math.floor(gap * 3);
                                loser.takeDamage(dmg, "DRAG RACE");
                                actionWords.push(new ActionWord(canvas.width / 2, canvas.height * 0.2, "FINISH!", 4.0));
                                if (winner === this) {
                                    actionWords.push(new ActionWord(winner.x, winner.y - 40, "EAT MY DUST!", 2.5));
                                } else {
                                    actionWords.push(new ActionWord(winner.x, winner.y - 40, "UPSET!", 2.5));
                                }
                                createExplosion(loser.x, loser.y, '#ff0055', 120, 5.0);
                                let sw = new Shockwave(loser.x, loser.y, '#ff0055', 500, 0, winner);
                                sw.hitFlag = true; shockwaves.push(sw);
                                triggerShake(50); flashScreen();
                            }
                        }
                        if (this.dragRaceTick === 60) {
                            this.dragRaceState = 'done';
                            // Teleport back
                            this.x = this.drSavedX; this.y = this.drSavedY;
                            this.vx = this.drSavedVx; this.vy = this.drSavedVy;
                            if (enemy) {
                                enemy.x = enemy.drSavedX; enemy.y = enemy.drSavedY;
                                enemy.vx = enemy.drSavedVx; enemy.vy = enemy.drSavedVy;
                            }
                            createExplosion(this.x, this.y, '#ff0055', 30, 2.0);
                            if (enemy) createExplosion(enemy.x, enemy.y, enemy.color, 30, 2.0);
                            setTimeout(() => { this.dragRaceState = null; }, 1000);
                        }
                    }
                }

                // Gravitational Pressure (Heavy Debuff)
                if (this.pressureTimer > 0) {
                    this.pressureTimer--;
                    this.vx *= 0.6; this.vy *= 0.6; // Heavy drag
                    this.mass = (CLASSES[this.classKey].mass) * 4;
                } else if (this.classKey !== 'POLYGON') {
                    this.mass = CLASSES[this.classKey].mass;
                }

                if (this.blackJackState) {

                    if (this.blackJackState !== 'done') {
                        this.statuses.stun = 10;
                        if (enemy) enemy.statuses.stun = 10;
                        // Lock to table positions
                        this.x = canvas.width * 0.3; this.y = canvas.height * 0.65;
                        this.vx = 0; this.vy = 0;
                        if (enemy) {
                            enemy.x = canvas.width * 0.7; enemy.y = canvas.height * 0.65;
                            enemy.vx = 0; enemy.vy = 0;
                        }
                    }

                    if (this.blackJackState === 'active' && enemy && enemy.hp > 0) {
                        this.blackJackTick++;

                        // Suspense drumroll between draws
                        if (this.blackJackTick % 8 === 0 && this.blackJackTick % 70 > 40) {
                            triggerShake(1 + (this.blackJackTick % 70) / 20);
                        }

                        if (this.blackJackTick % 70 === 0) {
                            // Dealer's turn — smart play with rigged draws
                            if (this.blackJackStatus === 'playing') {
                                let val = getHandValue(this.blackJackHand);
                                if (val < 17) {
                                    // Dramatic pause before drawing
                                    actionWords.push(new ActionWord(this.x, this.y - 50, "HMM...", 1.0));
                                    hitStopFrames = 8;
                                    setTimeout(() => {
                                        this.blackJackHand.push(drawDealerCard(this.blackJackHand));
                                        actionWords.push(new ActionWord(this.x, this.y - 30, "HIT!", 1.8));
                                        triggerShake(8);
                                        for (let i = 0; i < 8; i++) particles.push(new Particle(this.x, this.y - 100, '#ffd700', rand(5, 12), 30, rand(3, 6), false, 'star'));
                                    }, 0);
                                } else {
                                    this.blackJackStatus = 'hold';
                                    actionWords.push(new ActionWord(this.x, this.y - 30, "I'LL STAY.", 1.5));
                                    hitStopFrames = 15;
                                }
                            }
                        }

                        if (this.blackJackTick % 70 === 35) {
                            // Enemy's turn — plays recklessly (hits up to 18, more bust risk)
                            if (enemy.blackJackStatus === 'playing') {
                                let val = getHandValue(enemy.blackJackHand);
                                if (val < 18) {
                                    actionWords.push(new ActionWord(enemy.x, enemy.y - 50, "...", 1.0));
                                    hitStopFrames = 8;
                                    setTimeout(() => {
                                        enemy.blackJackHand.push(drawRandomCard()); // No rigging!
                                        actionWords.push(new ActionWord(enemy.x, enemy.y - 30, "HIT!", 1.8));
                                        triggerShake(8);
                                        for (let i = 0; i < 8; i++) particles.push(new Particle(enemy.x, enemy.y - 100, '#fff', rand(5, 12), 30, rand(3, 6), false, 'star'));
                                    }, 0);
                                } else {
                                    enemy.blackJackStatus = 'hold';
                                    actionWords.push(new ActionWord(enemy.x, enemy.y - 30, "HOLD!", 1.5));
                                    hitStopFrames = 15;
                                }
                            }
                        }

                        // Check for busts after each draw
                        if (getHandValue(this.blackJackHand) > 21 && this.blackJackStatus !== 'bust') {
                            this.blackJackStatus = 'bust';
                            actionWords.push(new ActionWord(this.x, this.y, "BUST!", 2.5));
                            createExplosion(this.x, this.y, '#f00', 60, 2.0);
                            triggerShake(25); hitStopFrames = 20;
                        }
                        if (getHandValue(enemy.blackJackHand) > 21 && enemy.blackJackStatus !== 'bust') {
                            enemy.blackJackStatus = 'bust';
                            actionWords.push(new ActionWord(enemy.x, enemy.y, "BUST!", 2.5));
                            createExplosion(enemy.x, enemy.y, '#f00', 60, 2.0);
                            triggerShake(25); hitStopFrames = 20;
                        }

                        if (this.blackJackStatus !== 'playing' && enemy.blackJackStatus !== 'playing') {
                            this.blackJackState = 'evaluating';
                            this.blackJackTick = 0;
                        }
                    } else if (this.blackJackState === 'evaluating') {
                        this.blackJackTick++;
                        // Dramatic staredown
                        if (this.blackJackTick === 30) {
                            actionWords.push(new ActionWord(canvas.width / 2, canvas.height * 0.3, "AND THE WINNER IS...", 2.0));
                            triggerShake(5); hitStopFrames = 25;
                        }
                        if (this.blackJackTick === 80) {
                            actionWords.push(new ActionWord(canvas.width / 2, canvas.height * 0.25, "...", 2.5));
                            triggerShake(10); hitStopFrames = 15;
                        }
                        if (this.blackJackTick === 120) {
                            let dVal = getHandValue(this.blackJackHand);
                            let eVal = getHandValue(enemy.blackJackHand);
                            let winner = null; let loser = null;

                            if (this.blackJackStatus === 'bust' && enemy.blackJackStatus === 'bust') {
                                // Both bust? House still wins!
                                winner = this; loser = enemy;
                            } else if (this.blackJackStatus === 'bust') {
                                winner = enemy; loser = this;
                            } else if (enemy.blackJackStatus === 'bust') {
                                winner = this; loser = enemy;
                            } else {
                                // Tie goes to the house (dealer)
                                if (dVal >= eVal) { winner = this; loser = enemy; }
                                else { winner = enemy; loser = this; }
                            }

                            let diff = Math.abs(dVal - eVal);
                            let isHouseWin = winner === this;
                            loser.takeDamage(diff * 50, "BLACKJACK");
                            actionWords.push(new ActionWord(loser.x, loser.y, "BUSTED!", 4.0));
                            if (isHouseWin) {
                                actionWords.push(new ActionWord(winner.x, winner.y, "HOUSE WINS!", 3.0));
                            } else {
                                actionWords.push(new ActionWord(winner.x, winner.y, "LUCKY!", 3.0));
                            }
                            createExplosion(loser.x, loser.y, '#ff0000', 150, 6.0);
                            let sw = new Shockwave(loser.x, loser.y, '#ff0000', 600, 0, winner);
                            sw.hitFlag = true; shockwaves.push(sw);
                            triggerShake(60); flashScreen(); hitStopFrames = 30;
                            this.blackJackState = 'done';
                            // Teleport back to original positions
                            this.x = this.bjSavedX; this.y = this.bjSavedY;
                            this.vx = this.bjSavedVx; this.vy = this.bjSavedVy;
                            if (enemy) {
                                enemy.x = enemy.bjSavedX; enemy.y = enemy.bjSavedY;
                                enemy.vx = enemy.bjSavedVx; enemy.vy = enemy.bjSavedVy;
                            }
                            createExplosion(this.x, this.y, '#ffd700', 30, 2.0);
                            if (enemy) createExplosion(enemy.x, enemy.y, enemy.color, 30, 2.0);
                            setTimeout(() => {
                                this.blackJackHand = null; if (enemy) enemy.blackJackHand = null;
                                this.blackJackState = null;
                            }, 2000);
                        }
                    }
                }

                if (this.throwTimer > 0) {
                    this.throwTimer--;
                    if (this.classKey === 'DEALER') {
                        if (this.throwTimer === 40) {
                            floatingTexts.push(new FloatingText(this.x, this.y - 30, "CHECKING...", "#ffcc00", 18));
                        }
                        if (this.throwTimer > 0 && this.throwTimer % 3 === 0) {
                            particles.push(new Particle(this.x, this.y, '#fff', rand(2, 6), 15, 3, false, 'square'));
                        }
                    }
                    if (this.throwTimer === 0 && this.orbitingCards.length > 0) {
                        let baseAng = enemy ? Math.atan2(enemy.y - this.y, enemy.x - this.x) : rand(0, Math.PI * 2);

                        if (this.classKey === 'DEALER') {
                            actionWords.push(new ActionWord(this.x, this.y - 40, this.handNameCache));
                            if (this.handNameCache === "ROYAL FLUSH!!!") { triggerShake(25); flashScreen(); }
                            // Chucking VFX
                            for (let i = 0; i < 20; i++) particles.push(new Particle(this.x, this.y, '#fff', rand(8, 15), 30, rand(3, 6), false, 'star'));
                            createExplosion(this.x, this.y, '#fff', 20, 1.5);
                            triggerShake(8);
                        }

                        this.orbitingCards.forEach((c, index) => {
                            let spread = (index - (this.orbitingCards.length - 1) / 2) * 0.15;
                            projectiles.push(new Projectile(this.x, this.y, Math.cos(baseAng + spread) * 25, Math.sin(baseAng + spread) * 25, 'card', this, c.dmg, c.suit));
                        });
                        this.orbitingCards = [];
                    }
                }

                if (this.flameThrowing > 0) {
                    this.flameThrowing--;
                    if (this.flameThrowing % 2 === 0 && enemy) {
                        let fDir = Math.atan2(enemy.y - this.y, enemy.x - this.x) + rand(-0.2, 0.2);
                        projectiles.push(new Projectile(this.x, this.y, Math.cos(fDir) * 20, Math.sin(fDir) * 20, 'flame_proj', this, 4, rand(12, 25)));
                        this.vx -= Math.cos(fDir) * 0.5; this.vy -= Math.sin(fDir) * 0.5;
                    }
                }

                if (this.classKey === 'BANSHEE') {
                    if (!this.isPhased) {
                        this.phaseTimer++;
                        if (this.phaseTimer > 600) {
                            this.isPhased = true; this.phaseTimer = 0;
                            this.phaseShield = 50; this.phaseActiveTimer = 300; // 5 seconds
                            floatingTexts.push(new FloatingText(this.x, this.y, "PHASED!", "#99bbff"));
                        }
                    } else {
                        this.phaseActiveTimer--;
                        if (this.phaseActiveTimer <= 0) {
                            this.isPhased = false;
                            floatingTexts.push(new FloatingText(this.x, this.y, "REVEALED!", "#99bbff"));
                        }
                        // Visual particles while phased
                        if (this.tick % 10 === 0) {
                            particles.push(new Particle(this.x + rand(-15, 15), this.y + rand(-15, 15), '#99bbff', rand(2, 5), 20, 2, false, 'circle'));
                        }
                    }
                }

                if (this.classKey === 'PYRO') {
                    if (Math.hypot(this.vx, this.vy) > 2) this.heat = Math.min(100, this.heat + 0.5);
                    else this.heat = Math.max(0, this.heat - 1);

                    if (this.heat >= 100 && this.tick % 2 === 0) {
                        projectiles.push(new Projectile(this.x, this.y, 0, 0, 'fire_trail', this, 2, 20));
                    }
                }

                if (this.brawlerAdrenaline > 0) this.brawlerAdrenaline--;

                if (this.nitro > 0) {
                    this.nitro--;
                    let rAng = Math.atan2(this.vy, this.vx) + Math.PI;
                    particles.push(new Particle(this.x + Math.cos(rAng) * this.r, this.y + Math.sin(rAng) * this.r, '#ff6600', rand(5, 10), 20, 8, false, 'square'));
                    particles.push(new Particle(this.x + Math.cos(rAng) * this.r, this.y + Math.sin(rAng) * this.r, '#aaa', rand(2, 5), 30, 10, false, 'circle'));
                }

                if (this.rapidPunching > 0) {
                    this.rapidPunching--;
                    if (this.rapidPunching % 4 === 0 && enemy) {
                        let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        let bDir = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        this.vx += Math.cos(bDir) * 3.5; this.vy += Math.sin(bDir) * 3.5;
                        // Stronger lunge during skill                        
                        if (dist < 130) {
                            enemy.takeDamage(8, "PUNCH");
                            enemy.vx += Math.cos(bDir) * 6; enemy.vy += Math.sin(bDir) * 6;
                            triggerShake(6);
                            projectiles.push(new Projectile(this.x + Math.cos(bDir) * 40 + rand(-25, 25), this.y + Math.sin(bDir) * 40 + rand(-25, 25), 0, 0, 'fist', this, 0, bDir));
                        }
                    }
                }

                if (this.shriekTimer > 0) {
                    this.shriekTimer--;
                    if (this.shriekTimer % 4 === 0 && this.target) {
                        let bDir = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                        projectiles.push(new Projectile(this.x, this.y, Math.cos(bDir) * 15, Math.sin(bDir) * 15, 'sonic', this, 3, 15));
                    }
                }

                if (this.chargeTimer > 0) {
                    this.chargeTimer--;
                    effects.push(new LaserSight(this, this.target, this.chargeTimer));
                    if (this.chargeTimer === 0 && this.target) {
                        let sDir = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                        projectiles.push(new Projectile(this.x, this.y, Math.cos(sDir) * 90, Math.sin(sDir) * 90, 'bullet', this, 50));
                        triggerShake(15);
                        this.vx -= Math.cos(sDir) * 12; this.vy -= Math.sin(sDir) * 12;
                        createExplosion(this.x + Math.cos(sDir) * this.r, this.y + Math.sin(sDir) * this.r, '#fff', 15, 1.2);
                        actionWords.push(new ActionWord(this.x, this.y, "HEADSHOT!", 1.5));
                    }
                }

                if (this.statuses.stun > 0 && this.classKey !== 'SPEEDBUMP') {
                    this.statuses.stun--;
                    this.rapidPunching = 0;
                    this.vx *= 0.6; this.vy *= 0.6;
                    if (this.statuses.stun % 5 === 0) particles.push(new Particle(this.x + rand(-15, 15), this.y + rand(-15, 15), '#00ff00', 0, 10, 3, false, 'square'));
                    if (this.statuses.stun === 0) {
                        let angle = rand(0, Math.PI * 2);
                        let targetSpd = isSuddenDeath ? this.baseSpd * 1.6 : this.baseSpd;
                        this.vx = Math.cos(angle) * targetSpd; this.vy = Math.sin(angle) * targetSpd;
                    }
                }
                if (this.statuses.burn > 0) {
                    this.statuses.burn--;
                    if (this.statuses.burn % 10 === 0) this.takeDamage(2, "BURN");
                    particles.push(new Particle(this.x, this.y, '#ff6600', 2, 20, 5, false, 'circle'));
                }
                if (this.statuses.poison > 0) {
                    this.statuses.poison--;
                    if (this.statuses.poison % 15 === 0) this.takeDamage(3, "POISON");
                    particles.push(new Particle(this.x, this.y, '#aa00ff', 1, 20, 4, false, 'circle'));
                }
                if (this.statuses.bleed > 0) {
                    this.statuses.bleed--;
                    if (this.statuses.bleed % 5 === 0) this.takeDamage(1, "BLEED");
                    particles.push(new Particle(this.x, this.y, '#ff0055', 3, 10, 4, false, 'circle'));
                }

                if (this.statuses.stun <= 0) {
                    this.skillCooldown--;
                    if (this.skillCooldown <= 0) {
                        this.useAbility(enemy);
                        this.skillCooldown = this.skillCooldownMax;
                    }
                }

                this.x += this.vx; this.y += this.vy;

                let speed = Math.hypot(this.vx, this.vy);
                let targetSpd = isSuddenDeath ? this.baseSpd * 1.6 : this.baseSpd;

                if (this.classKey === 'VAMPIRE' && enemy && enemy.hp < enemy.maxHp * 0.5) targetSpd *= 1.4;

                if (this.statuses.stun <= 0 && this.classKey !== 'DRIVER' && speed > 0.1) {
                    this.vx = (this.vx / speed) * (speed * 0.95 + targetSpd * 0.05);
                    this.vy = (this.vy / speed) * (speed * 0.95 + targetSpd * 0.05);
                }

                if (this.polyState === 'active') {
                    this.polyTick++;
                    enemy.x = canvas.width / 2; enemy.y = canvas.height / 2;
                    enemy.vx = 0; enemy.vy = 0;
                    this.vx = 0; this.vy = 0;

                    if (this.polyTick > 60 && this.polyTick < 180) {
                        if (this.polyTick % 10 === 0) {
                            let ang = (this.polyTick / 120) * Math.PI * 2 * 2;
                            this.x = canvas.width / 2 + Math.cos(ang) * 250;
                            this.y = canvas.height / 2 + Math.sin(ang) * 250;

                            let bAng = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                            effects.push(new StaticEffect(this.x, this.y, 'prism_beam', 15, { angle: bAng, width: 40 }));
                            let scaledDmg = 17.5 + (this.polySidesAtStart / 8);
                            enemy.takeDamage(scaledDmg, "MIRROR_STRIKE");
                            triggerShake(15);
                            createExplosion(this.x, this.y, this.color, 10);
                        }
                    }

                    if (this.polyTick >= 200) {
                        this.x = this.polySavedX; this.y = this.polySavedY;
                        enemy.x = enemy.polySavedX; enemy.y = enemy.polySavedY;
                        this.vx = this.polySavedVx; this.vy = this.polySavedVy;
                        enemy.vx = enemy.polySavedVx; enemy.vy = enemy.polySavedVy;
                        this.polyState = 'done';
                    }
                    return;
                }

                if (this.classKey === 'POLYGON') {
                    // Damage scales with sides
                    this.dmg = 10 * (1 + (this.sides / 32));
                    // Real Polygon Movement: Rotation based on speed
                    let dx = this.vx; let dy = this.vy;
                    let speed = Math.hypot(dx, dy);
                    if (speed > 0.5) {
                        this.visualRotation += (speed / this.r) * (dx > 0 ? 1 : -1);
                    }
                }

                if (this.classKey === 'GLITCH') {
                    if (this.x < 0) this.x = canvas.width; else if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height; else if (this.y > canvas.height) this.y = 0;
                } else {
                    if (this.x - this.r <= 0) {
                        this.x = this.r; this.vx *= -1; createExplosion(this.x, this.y, '#fff', 2, 0.5);
                        if (this.classKey === 'POLYGON') {
                            this.sides = Math.min(256, this.sides * 2);
                            actionWords.push(new ActionWord(this.x, this.y, "FRACTURE!"));
                            createExplosion(this.x, this.y, this.color, 15, 1);
                        }
                    }
                    else if (this.x + this.r >= canvas.width) {
                        this.x = canvas.width - this.r; this.vx *= -1; createExplosion(this.x, this.y, '#fff', 2, 0.5);
                        if (this.classKey === 'POLYGON') {
                            this.sides = Math.min(256, this.sides * 2);
                            actionWords.push(new ActionWord(this.x, this.y, "FRACTURE!"));
                            createExplosion(this.x, this.y, this.color, 15, 1);
                        }
                    }
                    if (this.y - this.r <= 0) {
                        this.y = this.r; this.vy *= -1; createExplosion(this.x, this.y, '#fff', 2, 0.5);
                        if (this.classKey === 'POLYGON') {
                            this.sides = Math.min(256, this.sides * 2);
                            actionWords.push(new ActionWord(this.x, this.y, "FRACTURE!"));
                            createExplosion(this.x, this.y, this.color, 15, 1);
                        }
                    }
                    else if (this.y + this.r >= canvas.height) {
                        this.y = canvas.height - this.r; this.vy *= -1; createExplosion(this.x, this.y, '#fff', 2, 0.5);
                        if (this.classKey === 'POLYGON') {
                            this.sides = Math.min(256, this.sides * 2);
                            actionWords.push(new ActionWord(this.x, this.y, "FRACTURE!"));
                            createExplosion(this.x, this.y, this.color, 15, 1);
                        }
                    }
                }

                if (this.classKey === 'GRAVITY') {
                    this.orbitalAngle += 0.05;
                    projectiles.forEach(p => {
                        if (p.owner !== this && p.active && Math.hypot(p.x - this.x, p.y - this.y) < this.r + 25) {
                            p.active = false;
                            createExplosion(p.x, p.y, '#aa00ff', 15, 1);
                            floatingTexts.push(new FloatingText(this.x, this.y, "GRAV BLOCK!", "#aa00ff", 14));
                        }
                    });
                }
            }

            draw(ctx) {
                if (this.isPhased) ctx.globalAlpha = 0.3;

                // Dynamic Drop Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + this.r * 1.2, this.r * 1.2, this.r * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                if (Math.hypot(this.vx, this.vy) > this.baseSpd * 1.2) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    ctx.strokeStyle = this.brawlerAdrenaline > 0 ? '#ff0000' : this.color;
                    ctx.lineWidth = this.r * 0.8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.globalAlpha = 0.3; ctx.stroke(); ctx.globalAlpha = this.isPhased ? 0.3 : 1.0;
                }

                ctx.save();
                ctx.translate(this.x, this.y);

                // Smoothed Scale
                ctx.scale(this.visualScale, this.visualScale);

                if (this.dancing) ctx.rotate(this.orbitalAngle);

                // Pulse Aura
                if (this.classKey !== 'POLYGON') {
                    let auraSize = this.r + 5 + Math.sin(Date.now() * 0.01) * 5;
                    ctx.beginPath(); ctx.arc(0, 0, auraSize, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.4;
                    ctx.stroke(); ctx.globalAlpha = this.isPhased ? 0.3 : 1.0;

                    if (this.brawlerAdrenaline > 0) {
                        ctx.beginPath(); ctx.arc(0, 0, this.r + rand(8, 20), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255,0,0,${rand(0.4, 0.9)})`; ctx.lineWidth = rand(3, 8); ctx.stroke();
                    }

                    if (this.skillCooldown < 30) {
                        ctx.beginPath(); ctx.arc(0, 0, this.r + 15 + Math.sin(Date.now() * 0.03) * 8, 0, Math.PI * 2);
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                    }
                }

                if (this.flashFrames > 0) { this.flashFrames--; ctx.fillStyle = '#fff'; }
                else ctx.fillStyle = this.color;

                ctx.lineWidth = 6; ctx.strokeStyle = '#000';

                // Physical body
                if (this.classKey === 'DRIVER') {
                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    ctx.fillRect(-this.r, -this.r * 0.8, this.r * 2.5, this.r * 1.6);
                    ctx.strokeRect(-this.r, -this.r * 0.8, this.r * 2.5, this.r * 1.6);
                    // Canopy
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(0, -this.r * 0.4, this.r * 1.2, this.r * 0.8);
                } else if (this.classKey === 'POLYGON') {
                    // RGB Neon Trail
                    if (this.trail.length > 8) this.trail.shift();
                    this.trail.push({ x: this.x, y: this.y, rot: this.visualRotation, sides: this.sides, t: Date.now() });
                    this.trail.forEach((t, i) => {
                        ctx.save(); ctx.translate(t.x - this.x, t.y - this.y); ctx.rotate(t.rot);
                        ctx.globalAlpha = (i / this.trail.length) * 0.4;
                        ctx.strokeStyle = `hsla(${(t.t * 0.2) % 360}, 100%, 70%, 1)`;
                        ctx.lineWidth = 2; ctx.beginPath();
                        for (let j = 0; j < t.sides; j++) {
                            let ang = (j / t.sides) * Math.PI * 2;
                            ctx.lineTo(Math.cos(ang) * this.r, Math.sin(ang) * this.r);
                        }
                        ctx.closePath(); ctx.stroke();
                        ctx.restore();
                    });

                    // Mathematical Aura
                    const symbols = ['π', 'Δ', 'Σ', 'Ω', '∞', '√'];
                    ctx.font = "900 12px 'Montserrat'"; ctx.textAlign = 'center';
                    for (let i = 0; i < 3; i++) {
                        let symAng = (Date.now() * 0.001 + (i * Math.PI * 2 / 3));
                        let sx = Math.cos(symAng) * (this.r + 35);
                        let sy = Math.sin(symAng) * (this.r + 35);
                        ctx.fillStyle = this.color; ctx.globalAlpha = 0.6;
                        ctx.fillText(symbols[(Math.floor(Date.now() / 1000) + i) % symbols.length], sx, sy);
                    }

                    // Energy Aura (Polygonal)
                    let auraPulse = 2 + Math.sin(Date.now() * 0.01) * 2;
                    ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    for (let i = 0; i < this.sides; i++) {
                        let ang = (i / this.sides) * Math.PI * 2 + this.visualRotation;
                        ctx.lineTo(Math.cos(ang) * (this.r + auraPulse), Math.sin(ang) * (this.r + auraPulse));
                    }
                    ctx.closePath(); ctx.stroke();

                    // Skill Ready Glow (Polygonal)
                    if (this.skillCooldown < 30) {
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6;
                        ctx.beginPath();
                        for (let i = 0; i < this.sides; i++) {
                            let ang = (i / this.sides) * Math.PI * 2 + this.visualRotation;
                            ctx.lineTo(Math.cos(ang) * (this.r + 12), Math.sin(ang) * (this.r + 12));
                        }
                        ctx.closePath(); ctx.stroke();
                    }
                    ctx.globalAlpha = 1.0;

                    // Real Polygon rendering
                    ctx.save();
                    ctx.rotate(this.visualRotation);
                    ctx.beginPath();
                    for (let i = 0; i < this.sides; i++) {
                        let ang = (i / this.sides) * Math.PI * 2;
                        ctx.lineTo(Math.cos(ang) * this.r, Math.sin(ang) * this.r);
                    }
                    ctx.closePath(); ctx.fill();
                    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
                    ctx.stroke();
                    ctx.lineWidth = 6; // Reset
                    // Geometric Shading
                    ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(this.r, 0); ctx.lineTo(Math.cos(Math.PI / this.sides) * this.r, Math.sin(Math.PI / this.sides) * this.r); ctx.fill();

                    // Vertex Searchlights & Sparks
                    for (let i = 0; i < this.sides; i++) {
                        if (i % (Math.ceil(this.sides / 12)) === 0) {
                            let ang = (i / this.sides) * Math.PI * 2;
                            let vx = Math.cos(ang) * this.r; let vy = Math.sin(ang) * this.r;

                            // Spark
                            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(vx, vy, 2, 0, Math.PI * 2); ctx.fill();

                            // Beam
                            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.moveTo(vx, vy); ctx.lineTo(vx * 1.5, vy * 1.5); ctx.stroke();
                        }
                    }

                    ctx.restore();

                    // Side Counter Label (Fixed position)
                    ctx.font = "900 14px 'Montserrat', sans-serif"; ctx.textAlign = 'center';
                    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
                    ctx.strokeText(`${this.sides} SIDES`, 0, this.r + 25);
                    ctx.fillText(`${this.sides} SIDES`, 0, this.r + 25);
                } else {
                    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    // Rim Light
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(0, 0, this.r - 4, -Math.PI / 4, Math.PI / 2); ctx.stroke();
                    ctx.lineWidth = 6; ctx.strokeStyle = '#000';
                }

                if (this.classKey === 'GLITCH') {
                    // Digital Jitter
                    let gx = (Math.random() - 0.5) * 6; let gy = (Math.random() - 0.5) * 6;
                    ctx.translate(gx, gy);

                    // Chromatic Aberration Shadows
                    ctx.save(); ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#f0f'; ctx.beginPath(); ctx.arc(rand(-4, 4), rand(-4, 4), this.r, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(rand(-4, 4), rand(-4, 4), this.r, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();

                    // Binary Leak
                    if (this.tick % 5 === 0) {
                        particles.push(new Particle(this.x + rand(-20, 20), this.y + rand(-20, 20), '#0f0', 1, 15, 8, false, 'square'));
                    }

                    // Horizontal Scanlines
                    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 1;
                    let scanY = (Date.now() * 0.2) % (this.r * 2) - this.r;
                    ctx.beginPath(); ctx.moveTo(-this.r, scanY); ctx.lineTo(this.r, scanY); ctx.stroke();
                }



                // --- Visual Weapons (Smoothed) ---
                if (this.classKey !== 'POLYGON') {
                    const domainStates = ['blackJackState', 'infernoState', 'glitchState', 'gravityState', 'dragRaceState',
                        'electionState', 'dojoState', 'mineState', 'bumpState', 'shriekState',
                        'bloodMoonState', 'killshotState', 'brawlState'];
                    const inDomain = [p1, p2].some(f => f && (domainStates.some(s => f[s] && f[s] !== 'done') || f.domainEntranceTick > 0));

                    if (!inDomain) {
                        ctx.save();
                        ctx.rotate(this.visualWeaponAngle);
                        ctx.lineWidth = 4; ctx.strokeStyle = '#000';

                        switch (this.classKey) {
                            case 'SNIPER':
                                ctx.fillStyle = '#444'; ctx.fillRect(this.r * 0.5, -5, 45, 10); ctx.strokeRect(this.r * 0.5, -5, 45, 10);
                                ctx.fillStyle = '#666'; ctx.fillRect(this.r * 1.5, -7, 10, 14); ctx.strokeRect(this.r * 1.5, -7, 10, 14);
                                // Laser sight (very faint)
                                ctx.strokeStyle = 'rgba(255,0,0,0.3)'; ctx.beginPath(); ctx.moveTo(this.r + 40, 0); ctx.lineTo(1000, 0); ctx.stroke();
                                break;
                            case 'NINJA':
                                ctx.fillStyle = '#ddd'; ctx.beginPath(); ctx.moveTo(this.r * 0.3, 0); ctx.lineTo(this.r + 40, -10); ctx.lineTo(this.r + 35, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
                                ctx.fillStyle = '#000'; ctx.fillRect(this.r * 0.3, -8, 10, 16);
                                break;
                            case 'BOOMER':
                                ctx.fillStyle = '#1a3d13'; ctx.fillRect(this.r * 0.2, -12, 50, 24); ctx.strokeRect(this.r * 0.2, -12, 50, 24);
                                ctx.fillStyle = '#333'; ctx.fillRect(this.r * 1.2, -14, 8, 28);
                                break;
                            case 'BRAWLER':
                                ctx.fillStyle = '#ff0000';
                                ctx.beginPath(); ctx.ellipse(this.r * 1.1, -15, 15, 12, 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                                ctx.beginPath(); ctx.ellipse(this.r * 1.1, 15, 15, 12, -0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                                break;
                            case 'PYRO':
                                ctx.fillStyle = '#ff6600'; ctx.fillRect(this.r * 0.5, -8, 35, 16); ctx.strokeRect(this.r * 0.5, -8, 35, 16);
                                ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(this.r + 35, 0, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                                if (this.flameThrowing > 0) {
                                    ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(this.r + 45 + Math.random() * 10, 0, 12, 0, Math.PI * 2); ctx.fill();
                                }
                                break;

                            case 'DEALER':
                                ctx.fillStyle = '#fff'; ctx.fillRect(this.r * 0.5, -18, 15, 22); ctx.strokeRect(this.r * 0.5, -18, 15, 22);
                                ctx.rotate(0.3); ctx.fillRect(this.r * 0.5, -18, 15, 22); ctx.strokeRect(this.r * 0.5, -18, 15, 22);
                                break;
                            case 'BANSHEE':
                                ctx.strokeStyle = '#888'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(60, -40); ctx.stroke();
                                ctx.fillStyle = '#99bbff'; ctx.beginPath(); ctx.moveTo(60, -40); ctx.quadraticCurveTo(80, 0, 40, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
                                break;
                            case 'GUNSLINGER':
                                // High-Quality Custom Revolver
                                ctx.translate(this.r * 0.4, 0);
                                
                                // Metal Gradient
                                let metal = ctx.createLinearGradient(0, -10, 0, 10);
                                metal.addColorStop(0, '#777'); metal.addColorStop(0.5, '#aaa'); metal.addColorStop(1, '#444');
                                
                                let wood = ctx.createLinearGradient(-25, 0, -10, 20);
                                wood.addColorStop(0, '#5d2906'); wood.addColorStop(1, '#8b4513');

                                // Handle / Grip
                                ctx.fillStyle = wood; 
                                ctx.beginPath(); ctx.roundRect(-24, 0, 14, 24, [0, 0, 8, 8]); ctx.fill(); ctx.stroke();
                                
                                // Trigger Guard
                                ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
                                ctx.beginPath(); ctx.arc(-10, 10, 6, 0, Math.PI * 2); ctx.stroke();

                                // Body / Frame
                                ctx.fillStyle = metal;
                                ctx.beginPath(); ctx.roundRect(-18, -10, 25, 20, 4); ctx.fill(); ctx.stroke();
                                
                                // Barrel
                                ctx.fillStyle = metal;
                                ctx.beginPath(); ctx.moveTo(5, -6); ctx.lineTo(45, -6); ctx.lineTo(45, 6); ctx.lineTo(5, 6); ctx.fill(); ctx.stroke();
                                // Barrel Sight
                                ctx.fillRect(40, -9, 4, 3);
                                
                                // Hammer
                                ctx.save();
                                ctx.translate(-15, -8);
                                if (this.fanShotsRemaining > 0) ctx.rotate(-0.5); // Cocked
                                ctx.fillStyle = '#333'; ctx.fillRect(-2, -6, 6, 8);
                                ctx.restore();

                                // Cylinder
                                ctx.save(); 
                                ctx.translate(-4, 0); 
                                ctx.rotate(this.tick * 0.15 + (this.fanShotsRemaining * 1.5));
                                // Cylinder Body
                                let cyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 10);
                                cyGrad.addColorStop(0, '#999'); cyGrad.addColorStop(1, '#222');
                                ctx.fillStyle = cyGrad;
                                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                                // Chambers
                                ctx.fillStyle = '#000';
                                for(let i=0; i<6; i++) {
                                    ctx.beginPath(); ctx.arc(Math.cos(i*Math.PI*2/6)*6, Math.sin(i*Math.PI*2/6)*6, 2.5, 0, Math.PI*2); ctx.fill();
                                }
                                ctx.restore();

                                // Barrel Heat / Muzzle Flash
                                if (this.fanShotsRemaining > 0 && this.fanCooldown > 2) {
                                    let flashSize = 15 + Math.random() * 10;
                                    let fGrad = ctx.createRadialGradient(45, 0, 0, 45, 0, flashSize);
                                    fGrad.addColorStop(0, '#fff'); fGrad.addColorStop(0.4, '#ffcc00'); fGrad.addColorStop(1, 'transparent');
                                    ctx.fillStyle = fGrad;
                                    ctx.beginPath(); ctx.arc(45, 0, flashSize, 0, Math.PI * 2); ctx.fill();
                                    
                                    // Sparks
                                    for(let i=0; i<3; i++) {
                                        particles.push(new Particle(this.x + Math.cos(this.visualWeaponAngle)*70, this.y + Math.sin(this.visualWeaponAngle)*70, '#ffcc00', rand(3,6), 12, 4, false));
                                    }
                                }
                                break;
                        }
                        ctx.restore();
                    }
                    // Eyes Logic (Smoothed)
                    let eyeDist = this.r * 0.3;
                    ctx.fillStyle = '#000';
                    if (Date.now() % 3000 > 150) { // Blinking
                        ctx.beginPath(); ctx.arc(Math.cos(this.visualEyeAngle) * eyeDist, Math.sin(this.visualEyeAngle) * eyeDist, 5, 0, Math.PI * 2); ctx.fill();
                    }
                }

                ctx.restore();

                ctx.font = `900 ${this.r + 8}px 'Bangers', cursive`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;

                if (this.classKey !== 'POLYGON') {
                    ctx.font = `900 ${this.r + 8}px 'Bangers', cursive`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
                    ctx.strokeText(this.emoji, this.x, this.y + 2);
                    ctx.fillText(this.emoji, this.x, this.y + 2);
                }

                ctx.globalAlpha = 1.0;

                if (this.classKey === 'GRAVITY') {
                    // Orbital Pulsars (Now Functional)
                    let enemy = (this === p1) ? p2 : p1;
                    ctx.fillStyle = '#4444ff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
                    let time = Date.now() * 0.003;
                    for (let i = 0; i < 3; i++) {
                        let ang = this.orbitalAngle + (i * Math.PI * 2 / 3);
                        let ax = this.x + Math.cos(ang) * 35; let ay = this.y + Math.sin(ang) * 35;

                        // Pulsar Pulse
                        let pulse = 6 + Math.sin(time + i) * 2;
                        ctx.beginPath(); ctx.arc(ax, ay, pulse, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

                        // Core Glow
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ax, ay, pulse / 3, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#4444ff';

                        // Automated Needle (Visual only spark)
                        if (Date.now() % 1000 < 50 && i === 0 && enemy && enemy.hp > 0) {
                            ctx.strokeStyle = 'rgba(100, 100, 255, 0.4)'; ctx.lineWidth = 1;
                            ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(enemy.x, enemy.y); ctx.stroke();
                        }
                    }
                }

                if (this.orbitingCards.length > 0) {
                    let orbitSpd = Date.now() * 0.005;
                    this.orbitingCards.forEach((c, i) => {
                        let ang = orbitSpd + (i * Math.PI * 2 / this.orbitingCards.length);
                        let cx = this.x + Math.cos(ang) * 40; let cy = this.y + Math.sin(ang) * 40;
                        ctx.fillStyle = '#fff'; ctx.fillRect(cx - 6, cy - 8, 12, 16); ctx.strokeRect(cx - 6, cy - 8, 12, 16);
                        ctx.fillStyle = (c.suit === '♥' || c.suit === '♦') ? '#f00' : '#000';
                        ctx.font = '10px Arial'; ctx.fillText(c.suit, cx, cy);
                    });
                }

                if (this.blackJackHand && this.blackJackHand.length > 0) {
                    let numCards = this.blackJackHand.length;
                    let spread = 50;
                    let startX = this.x - ((numCards - 1) * spread) / 2;
                    let renderY = this.y - 130;

                    this.blackJackHand.forEach((c, i) => {
                        drawCard(ctx, startX + (i * spread), renderY, c.rank, c.suit, 0.9);
                    });

                    let val = getHandValue(this.blackJackHand);
                    ctx.textAlign = 'center';
                    ctx.font = "900 36px 'Montserrat', sans-serif";
                    ctx.fillStyle = val > 21 ? '#ff3333' : (val === 21 ? '#33ff33' : '#fff');
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
                    let labelY = renderY - 70;
                    ctx.strokeText(val, this.x, labelY);
                    ctx.fillText(val, this.x, labelY);

                    // Status label
                    if (this.blackJackStatus === 'hold') {
                        ctx.font = "900 20px 'Montserrat', sans-serif";
                        ctx.fillStyle = '#ffd700';
                        ctx.strokeText('HOLDING', this.x, labelY - 30);
                        ctx.fillText('HOLDING', this.x, labelY - 30);
                    } else if (this.blackJackStatus === 'bust') {
                        ctx.font = "900 20px 'Montserrat', sans-serif";
                        ctx.fillStyle = '#ff3333';
                        ctx.strokeText('BUSTED', this.x, labelY - 30);
                        ctx.fillText('BUSTED', this.x, labelY - 30);
                    }
                }
            }
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function startMatch() {
            p1 = new Fighter('p1', document.getElementById('p1Select').value);
            p2 = new Fighter('p2', document.getElementById('p2Select').value);

            particles = []; projectiles = []; shockwaves = []; floatingTexts = []; effects = []; actionWords = [];

            matchTimer = 0; isSuddenDeath = false; screenShake = 0; hitStopFrames = 0;
            ui.sdText.style.opacity = 0; flashOverlay.style.opacity = 0;

            ui.p1Name.innerHTML = `${p1.emoji} ${p1.name} <span style="font-size:14px; color:#aaa; font-family:'Montserrat';">(${p1.classKey})</span>`;
            ui.p1Name.style.color = p1.color;
            ui.p2Name.innerHTML = `${p2.emoji} ${p2.name} <span style="font-size:14px; color:#aaa; font-family:'Montserrat';">(${p2.classKey})</span>`;
            ui.p2Name.style.color = p2.color;

            log(`🥊 <b>${p1.name}</b> vs <b>${p2.name}</b> - FIGHT!`, 'log-match');
            actionWords.push(new ActionWord(canvas.width / 2, canvas.height / 2, "FIGHT!", 1.5));
        }

        function resolveFighterCollisions() {
            if (!p1 || !p2 || p1.hp <= 0 || p2.hp <= 0) return;

            // Disable Standard Collision damage during Domain Expansions/Transitions
            const domainStates = ['blackJackState', 'infernoState', 'glitchState', 'gravityState', 'dragRaceState',
                'electionState', 'dojoState', 'mineState', 'bumpState', 'shriekState',
                'bloodMoonState', 'killshotState', 'brawlState'];
            const anyDomain = [p1, p2].some(f => domainStates.some(s => f[s] && f[s] !== 'done') || f.domainEntranceTick > 0);
            if (anyDomain) return;

            let dx = p2.x - p1.x; let dy = p2.y - p1.y;
            let dist = Math.hypot(dx, dy);

            if (dist < p1.r + p2.r) {
                if (p1.isPhased) { p1.isPhased = false; return; }
                if (p2.isPhased) { p2.isPhased = false; return; }

                let relVelX = p1.vx - p2.vx; let relVelY = p1.vy - p2.vy;
                let impactSpeed = Math.hypot(relVelX, relVelY);

                let d1 = p1.dmg + (impactSpeed * p1.mass * 0.5);
                let d2 = p2.dmg + (impactSpeed * p2.mass * 0.5);

                if (p1.classKey === 'DRIVER') d1 += Math.hypot(p1.vx, p1.vy) * 2;
                if (p2.classKey === 'DRIVER') d2 += Math.hypot(p2.vx, p2.vy) * 2;

                if (p1.classKey === 'BRAWLER' && p1.brawlerAdrenaline > 0) d1 *= 2;
                if (p2.classKey === 'BRAWLER' && p2.brawlerAdrenaline > 0) d2 *= 2;

                if (p1.classKey === 'SNIPER') d1 *= (1 + (dist / 500));
                if (p2.classKey === 'SNIPER') d2 *= (1 + (dist / 500));

                p2.takeDamage(d1, "CLASH");
                p1.takeDamage(d2, "CLASH");

                if (p1.classKey === 'VAMPIRE') p1.hp = Math.min(p1.maxHp, p1.hp + d1 * 0.1);
                if (p2.classKey === 'VAMPIRE') p2.hp = Math.min(p2.maxHp, p2.hp + d2 * 0.1);

                if (p1.classKey === 'POLITICIAN') { p2.maxHp -= 5; p1.maxHp += 5; p1.hp += 5; floatingTexts.push(new FloatingText(p1.x, p1.y, "EMBEZZLED!", "#0f0")); }
                if (p2.classKey === 'POLITICIAN') { p1.maxHp -= 5; p2.maxHp += 5; p2.hp += 5; floatingTexts.push(new FloatingText(p2.x, p2.y, "EMBEZZLED!", "#0f0")); }

                if (p1.classKey === 'POLYGON') {
                    d1 *= (1 + (p1.sides / 8));
                    p1.sides = Math.min(256, p1.sides * 2);
                    actionWords.push(new ActionWord(p1.x, p1.y, "FRACTURE!"));
                    createExplosion(p1.x, p1.y, p1.color, 10, 1);
                }
                if (p2.classKey === 'POLYGON') {
                    d2 *= (1 + (p2.sides / 8));
                    p2.sides = Math.min(256, p2.sides * 2);
                    actionWords.push(new ActionWord(p2.x, p2.y, "FRACTURE!"));
                    createExplosion(p2.x, p2.y, p2.color, 10, 1);
                }

                triggerShake(impactSpeed > 18 ? 15 : 8);
                createExplosion(p1.x + dx / 2, p1.y + dy / 2, '#fff', 30, 1.5);
                for (let i = 0; i < 5; i++) particles.push(new Particle(p1.x + dx / 2, p1.y + dy / 2, '#ffcc00', rand(5, 15), 20, rand(8, 15), true, 'star'));

                if (impactSpeed > 25) {
                    hitStopFrames = 8;
                    actionWords.push(new ActionWord(p1.x + dx / 2, p1.y + dy / 2, "SMASH!", 1.5));
                    for (let i = 0; i < 12; i++) particles.push(new Particle(p1.x + dx / 2, p1.y + dy / 2, '#fff', 30, 15, 8, false, 'line'));
                }
                else if (impactSpeed > 15) {
                    hitStopFrames = 4;
                    actionWords.push(new ActionWord(p1.x + dx / 2, p1.y + dy / 2, "POW!"));
                    for (let i = 0; i < 8; i++) particles.push(new Particle(p1.x + dx / 2, p1.y + dy / 2, '#ffcc00', 20, 10, 5, false, 'line'));
                }

                if (dist === 0) { dx = 1; dy = 0; dist = 1; }
                let nx = dx / dist, ny = dy / dist;
                let vNorm = relVelX * nx + relVelY * ny;

                if (vNorm > 0) {
                    let restitution = 0.9;
                    let impulse = (1 + restitution) * vNorm / ((1 / p1.mass) + (1 / p2.mass));

                    if (p1.classKey !== 'SPEEDBUMP') { p1.vx -= (impulse * nx) / p1.mass; p1.vy -= (impulse * ny) / p1.mass; }
                    if (p2.classKey !== 'SPEEDBUMP') { p2.vx += (impulse * nx) / p2.mass; p2.vy += (impulse * ny) / p2.mass; }
                }

                let overlap = (p1.r + p2.r) - dist;
                if (p1.classKey !== 'SPEEDBUMP') { p1.x -= (overlap / 2) * nx; p1.y -= (overlap / 2) * ny; }
                if (p2.classKey !== 'SPEEDBUMP') { p2.x += (overlap / 2) * nx; p2.y += (overlap / 2) * ny; }
            }
        }

        function updateUIAndState() {
            if (!p1 || !p2) return;

            ui.p1Hp.style.width = `${Math.max(0, p1.hp / p1.maxHp) * 100}%`;
            ui.p2Hp.style.width = `${Math.max(0, p2.hp / p2.maxHp) * 100}%`;
            ui.p1Text.innerText = `${Math.ceil(Math.max(0, p1.hp))} / ${p1.maxHp}`;
            ui.p2Text.innerText = `${Math.ceil(Math.max(0, p2.hp))} / ${p2.maxHp}`;

            matchTimer++;
            if (matchTimer === 1200 && !isSuddenDeath) {
                isSuddenDeath = true;
                ui.sdText.style.opacity = 1;
                setTimeout(() => { ui.sdText.style.opacity = 0; }, 1000);
                log("⚠️ SUDDEN DEATH! MAXIMUM SPEED & MAYHEM! ⚠️", "log-match");
                triggerShake(25); hitStopFrames = 10; flashScreen();
            }

            if (p1 && p2 && (p1.hp <= 0 || p2.hp <= 0)) {
                let winner = p1.hp > 0 ? p1 : (p2.hp > 0 ? p2 : null);
                let loser = p1.hp <= 0 ? p1 : p2;

                log(`💀 ${loser.name} was ANNIHILATED!`, 'log-death');
                createExplosion(loser.x, loser.y, loser.color, 150, 4);
                triggerShake(40); hitStopFrames = 15; flashScreen();
                actionWords.push(new ActionWord(loser.x, loser.y, "K.O.!!", 2.0));

                if (winner) {
                    log(`🏆 <b>${winner.name}</b> WINS!`, 'log-match');
                    winner.dancing = true;
                    if (p1 === loser) p1 = null; else p2 = null;
                    setTimeout(() => actionWords.push(new ActionWord(canvas.width / 2, canvas.height / 2 - 50, "WINNER!", 3.0)), 500);
                } else {
                    log(`🤝 MUTUAL DESTRUCTION! DRAW!`, 'log-match');
                    createExplosion(p1.x, p1.y, p1.color, 100, 4);
                    p1 = null; p2 = null;
                }
            }
        }

        // ==========================================
        // MAIN RENDERING LOOP
        // ==========================================
        function drawComicBackground() {
            // Main floor color
            ctx.fillStyle = isSuddenDeath ? '#ffb3b3' : '#fceea7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Comic Action Rays
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            if (isSuddenDeath) ctx.rotate(Date.now() * 0.002);

            ctx.fillStyle = isSuddenDeath ? '#ff6666' : '#f5e076';
            let numRays = 24;
            for (let i = 0; i < numRays; i++) {
                if (i % 2 === 0) continue;
                let angle1 = (i / numRays) * Math.PI * 2;
                let angle2 = ((i + 1) / numRays) * Math.PI * 2;
                ctx.beginPath(); ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(angle1) * 1500, Math.sin(angle1) * 1500);
                ctx.lineTo(Math.cos(angle2) * 1500, Math.sin(angle2) * 1500);
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();

            // Halftone Dots
            ctx.fillStyle = 'rgba(0,0,0,0.06)';
            const dotSpacing = 16;
            for (let x = 0; x < canvas.width; x += dotSpacing) {
                for (let y = 0; y < canvas.height; y += dotSpacing) {
                    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill();
                }
            }

            // Vignette Overlay
            let vig = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.width * 0.2, canvas.width / 2, canvas.height / 2, canvas.width * 0.8);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, 'rgba(0,0,0,0.2)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Floor Scratches / Action Lines
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                let sx = (i * 250 + Date.now() * 0.02) % canvas.width;
                ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx - 100, canvas.height); ctx.stroke();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let fighters = [p1, p2].filter(f => f);

            // Domain Entrance Transition (Jujutsu Kaisen Style)
            let entFighter = fighters.find(f => f.domainEntranceTick > 0);
            if (entFighter) {
                let t = 1 - (entFighter.domainEntranceTick / 40);
                let cx = entFighter.x; let cy = entFighter.y;

                // Dark vortex expansion
                ctx.save();
                ctx.fillStyle = '#000';
                let radius = Math.max(0, t * Math.max(canvas.width, canvas.height) * 1.8);
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();

                // Chromatic Aberration Rim
                ctx.strokeStyle = entFighter.color; ctx.lineWidth = 15;
                ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.stroke();

                // Space Distortion (White lines)
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                for (let i = 0; i < 8; i++) {
                    let ang = (i / 8) * Math.PI * 2 + t * 3;
                    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(ang) * radius, cy + Math.sin(ang) * radius); ctx.stroke();
                }

                // Ink splats
                ctx.fillStyle = '#000';
                for (let i = 0; i < 12; i++) {
                    let ang = (i / 12) * Math.PI * 2;
                    let splatR = radius * (0.8 + Math.sin(t * 5 + i) * 0.2);
                    ctx.beginPath(); ctx.arc(cx + Math.cos(ang) * splatR, cy + Math.sin(ang) * splatR, 30 * (1 - t), 0, Math.PI * 2); ctx.fill();
                }

                ctx.restore();
                entFighter.domainEntranceTick--;
                requestAnimationFrame(gameLoop);
                return;
            }


            ctx.save();
            if (screenShake > 0) {
                ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
                ctx.rotate(rand(-screenShake * 0.002, screenShake * 0.002));
                screenShake *= 0.85;
                if (screenShake < 0.5) screenShake = 0;
            }

            drawComicBackground();



            let isBlackJackActive = fighters.some(f => f.blackJackState && f.blackJackState !== 'done');
            let isInfernoActive = fighters.some(f => f.infernoState && f.infernoState !== 'done');
            let isGlitchActive = fighters.some(f => f.glitchState && f.glitchState !== 'done');
            let isGravityActive = fighters.some(f => f.gravityState && f.gravityState !== 'done');
            let isDragRaceActive = fighters.some(f => f.dragRaceState && f.dragRaceState !== 'done');
            let isElectionActive = fighters.some(f => f.electionState && f.electionState !== 'done');
            let isDojoActive = fighters.some(f => f.dojoState && f.dojoState !== 'done');
            let isMineActive = fighters.some(f => f.mineState && f.mineState !== 'done');
            let isBumpActive = fighters.some(f => f.bumpState && f.bumpState !== 'done');
            let isShriekActive = fighters.some(f => f.shriekState && f.shriekState !== 'done');
            let isBloodMoonActive = fighters.some(f => f.bloodMoonState && f.bloodMoonState !== 'done');
            let isKillshotActive = fighters.some(f => f.killshotState && f.killshotState !== 'done');
            let isBrawlActive = fighters.some(f => f.brawlState && f.brawlState !== 'done');
            let isHighNoonActive = fighters.some(f => f.highNoonState && f.highNoonState !== 'done');

            if (isBrawlActive) {
                // === FINAL ROUND BOXING RING RENDERING ===
                let brFighter = fighters.find(f => f.brawlState && f.brawlState !== 'done');
                let brTick = brFighter ? brFighter.brawlTick : 0;
                let brState = brFighter ? brFighter.brawlState : '';

                // Arena darkness
                let arenaGrad = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.5, 50, canvas.width / 2, canvas.height * 0.5, canvas.width);
                arenaGrad.addColorStop(0, '#1a0a2e');
                arenaGrad.addColorStop(1, '#050010');
                ctx.fillStyle = arenaGrad;
                ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);

                // Spotlight from above
                let spotGrad = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.3, 20, canvas.width / 2, canvas.height * 0.6, 250);
                spotGrad.addColorStop(0, 'rgba(255, 240, 200, 0.15)');
                spotGrad.addColorStop(1, 'rgba(255, 240, 200, 0)');
                ctx.fillStyle = spotGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Ring floor (canvas mat)
                let ringX = canvas.width * 0.1;
                let ringY = canvas.height * 0.55;
                let ringW = canvas.width * 0.8;
                let ringH = canvas.height * 0.35;
                ctx.fillStyle = '#2a1a40';
                ctx.fillRect(ringX, ringY, ringW, ringH);
                ctx.strokeStyle = '#aa00ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(ringX, ringY, ringW, ringH);

                // Ring corner posts
                ctx.fillStyle = '#aa00ff';
                ctx.fillRect(ringX - 5, ringY - 5, 12, ringH + 10);
                ctx.fillRect(ringX + ringW - 7, ringY - 5, 12, ringH + 10);
                // Top corner posts
                ctx.fillRect(ringX - 5, ringY - 60, 12, 65);
                ctx.fillRect(ringX + ringW - 7, ringY - 60, 12, 65);

                // Ring ropes (3 ropes)
                for (let r = 0; r < 3; r++) {
                    let ropeY = ringY - 10 - r * 20;
                    let sag = Math.sin(Date.now() * 0.003 + r) * 3;
                    ctx.strokeStyle = r === 0 ? '#ff0055' : (r === 1 ? '#fff' : '#ff0055');
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(ringX + 5, ropeY);
                    ctx.quadraticCurveTo(canvas.width / 2, ropeY + sag, ringX + ringW - 5, ropeY);
                    ctx.stroke();
                }

                // Camera Flashes (Paparazzi)
                if (Math.random() < 0.1) {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath(); ctx.arc(rand(0, canvas.width), rand(0, canvas.height * 0.5), rand(30, 80), 0, Math.PI * 2); ctx.fill();
                }

                // Crowd silhouettes (background)
                ctx.fillStyle = '#0a0515';
                for (let i = 0; i < 30; i++) {
                    let cx = i * (canvas.width / 29);
                    let cy = ringY - 70 - Math.abs(Math.sin(i * 0.5)) * 30;
                    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.fillRect(cx - 6, cy + 8, 12, 15);
                }

                // Combo counter
                if (brFighter && brFighter.brawlCombo > 0 && brState === 'combo') {
                    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
                    ctx.font = "900 50px 'Montserrat', sans-serif";
                    ctx.fillStyle = '#aa00ff';
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
                    ctx.strokeText(`${brFighter.brawlCombo} HIT COMBO`, canvas.width - 30, 30);
                    ctx.fillText(`${brFighter.brawlCombo} HIT COMBO`, canvas.width - 30, 30);
                }

                // K.O. flash during finisher
                if (brState === 'finisher' && brTick >= 38 && brTick < 50) {
                    ctx.fillStyle = `rgba(170, 0, 255, ${0.3 - (brTick - 38) * 0.025})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // Title
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 70px 'Montserrat', sans-serif";
                ctx.fillStyle = `rgba(170, 0, 255, ${0.12 + Math.sin(Date.now() * 0.004) * 0.05})`;
                ctx.fillText('FINAL ROUND', canvas.width / 2, canvas.height * 0.15);

            } else if (isHighNoonActive) {
                // === HIGH NOON DESERT DUEL RENDERING ===
                let hf = fighters.find(f => f.highNoonState && f.highNoonState !== 'done');
                let hTick = hf ? hf.highNoonTick : 0;
                let hState = hf ? hf.highNoonState : '';

                // Sepia/Desert background
                ctx.fillStyle = '#f4a460';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Desert Sun
                let sunGlow = ctx.createRadialGradient(canvas.width / 2, canvas.height * 0.2, 50, canvas.width / 2, canvas.height * 0.2, 400);
                sunGlow.addColorStop(0, '#ffcc00');
                sunGlow.addColorStop(0.5, '#ff8800');
                sunGlow.addColorStop(1, 'rgba(255, 136, 0, 0)');
                ctx.fillStyle = sunGlow;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height * 0.2, 80, 0, Math.PI * 2); ctx.fill();

                // Cactus & Desert Details (Silhouettes)
                ctx.fillStyle = '#2d1e12';
                const drawCactus = (x, y, scale) => {
                    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
                    ctx.fillRect(-10, -50, 20, 50); // Trunk
                    ctx.fillRect(-30, -35, 20, 10); ctx.fillRect(-30, -45, 10, 20); // Arm 1
                    ctx.fillRect(10, -25, 20, 10); ctx.fillRect(20, -35, 10, 20); // Arm 2
                    ctx.restore();
                };
                drawCactus(100, canvas.height * 0.9, 1.2);
                drawCactus(canvas.width - 150, canvas.height * 0.85, 0.8);
                drawCactus(canvas.width * 0.4, canvas.height * 0.95, 0.5);

                // Horizon action lines (Heat distortion)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    let hy = canvas.height * 0.6 + Math.sin(Date.now() * 0.005 + i) * 10;
                    ctx.beginPath(); ctx.moveTo(0, hy); ctx.lineTo(canvas.width, hy); ctx.stroke();
                }

                // Title & Cinematic Bars
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, 100); // Top bar
                ctx.fillRect(0, canvas.height - 100, canvas.width, 100); // Bottom bar

                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 60px 'Bangers', cursive";
                ctx.fillStyle = '#ffcc00';
                ctx.strokeStyle = '#000'; ctx.lineWidth = 8;
                let title = hState === 'draw' ? "IT'S TIME!" : "HIGH NOON";
                ctx.strokeText(title, canvas.width / 2, 50);
                ctx.fillText(title, canvas.width / 2, 50);

                // Tumbleweeds
                if (Math.random() < 0.02) {
                    let tw = new Particle(canvas.width + 50, canvas.height * 0.7 + rand(-20, 20), '#8b4513', rand(5, 10), 200, rand(15, 25), true, 'circle');
                    tw.vx = -rand(3, 6); tw.vy = rand(-1, 1);
                    particles.push(tw);
                }

                // Draw fighters over the bars/desert but with high contrast
                fighters.forEach(f => {
                    ctx.save(); ctx.translate(f.x, f.y);
                    // High Noon Silhouette style helper
                    ctx.shadowBlur = 15; ctx.shadowColor = '#000';
                    ctx.restore();
                });

            } else if (isGravityActive) {
