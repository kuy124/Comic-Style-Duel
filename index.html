<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1v1 Ultimate Mayhem: Comic Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@900&display=swap');

        :root {
            --bg: #1a0b2e;
            --border: #000;
            --ui-width: 100%;
            --max-width: 900px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%),
                repeating-linear-gradient(45deg, #1a0b2e 0px, #1a0b2e 10px, #21103a 10px, #21103a 20px);
            color: #fff;
            font-family: 'Montserrat', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Top UI */
        .hud {
            width: var(--ui-width);
            max-width: var(--max-width);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        .player-info {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .p2-info {
            align-items: flex-end;
            text-align: right;
        }

        .name-tag {
            font-family: 'Bangers', cursive;
            font-size: 26px;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .health-bar-bg {
            width: 100%;
            height: 35px;
            background: #222;
            border: 5px solid var(--border);
            border-radius: 4px;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 1);
            transform: skewX(-10deg);
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) skewX(10deg);
            font-weight: 900;
            font-size: 18px;
            text-shadow: 2px 2px 0px #000;
            z-index: 5;
        }

        .p1-info .health-bar-fill {
            background: linear-gradient(90deg, #ff0055, #ffcc00);
            transform-origin: left;
        }

        .p2-info .health-bar-fill {
            background: linear-gradient(90deg, #00eeff, #0055ff);
            float: right;
        }

        .vs-badge {
            font-family: 'Bangers', cursive;
            font-size: 45px;
            color: #ffcc00;
            text-shadow: 4px 4px 0px #ff0055, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 2px 2px 0px #000;
            animation: pop 0.5s infinite alternate;
            z-index: 20;
        }

        /* Canvas Arena */
        .arena-container {
            width: var(--ui-width);
            max-width: var(--max-width);
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
            background-color: #fceea7;
            border: 8px solid var(--border);
            border-radius: 4px;
            box-shadow: 12px 12px 0px #000;
        }

        #flashOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            border-radius: 4px;
            transition: opacity 0.1s;
            z-index: 15;
        }

        /* Bottom Controls */
        .bottom-panel {
            width: var(--ui-width);
            max-width: var(--max-width);
            margin-top: 15px;
            display: flex;
            gap: 15px;
            height: 110px;
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 260px;
            flex-shrink: 0;
            justify-content: center;
        }

        .selects {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 5px;
        }

        select {
            width: 45%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 12px;
            border: 3px solid #000;
            border-radius: 4px;
            padding: 4px;
            cursor: pointer;
            background: #fff;
            color: #000;
            outline: none;
        }

        button {
            padding: 8px 10px;
            background: #00eeff;
            border: 5px solid #000;
            border-radius: 4px;
            color: #000;
            font-family: 'Bangers', cursive;
            font-size: 26px;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            box-shadow: 6px 6px 0px #ff0055;
            transition: all 0.1s;
        }

        button:hover {
            background: #ffcc00;
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #ff0055;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #ff0055;
        }

        .log-box {
            flex: 1;
            background: #fff;
            border: 5px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            color: #000;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 6px 6px 0px #000;
            display: flex;
            flex-direction: column;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 2px dotted #ccc;
            padding-bottom: 4px;
            animation: slideIn 0.2s;
        }

        .log-entry:last-child {
            border: none;
        }

        .log-match {
            color: #0055ff;
            font-size: 16px;
        }

        .log-death {
            color: #ff0055;
            font-size: 16px;
        }

        .log-ability {
            color: #aa00ff;
        }

        .log-passive {
            color: #00cc44;
            font-style: italic;
        }

        #suddenDeath {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-5deg);
            font-family: 'Bangers', cursive;
            font-size: 100px;
            color: #ff0055;
            text-shadow: 6px 6px 0px #000, -3px -3px 0px #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 20;
            text-align: center;
            line-height: 0.9;
        }

        @keyframes pop {
            from {
                transform: scale(1) rotate(-5deg);
            }

            to {
                transform: scale(1.15) rotate(5deg);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-10px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading & Menu Styles */
        #loadingScreen,
        #mainMenu {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a0b2e;
            overflow: hidden;
        }

        #loadingScreen {
            z-index: 200;
        }

        .loader-content {
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        .comic-title {
            font-family: 'Bangers';
            font-size: 60px;
            color: #ffcc00;
            text-shadow: 6px 6px 0px #ff0055;
            margin-bottom: 20px;
        }

        .loader-bar {
            width: 100%;
            height: 30px;
            background: #000;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            transform: skewX(-15deg);
        }

        #loaderFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ffcc00);
            transition: width 0.3s;
        }

        .comic-status {
            font-family: 'Bangers';
            margin-top: 15px;
            color: #fff;
            font-size: 20px;
            letter-spacing: 2px;
        }

        #mainMenu {
            background: url('comic_menu_bg.png') center/cover no-repeat;
            display: none;
            flex-direction: row;
            align-items: stretch;
            justify-content: flex-end;
        }

        .main-menu-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(26, 11, 46, 0) 0%, rgba(26, 11, 46, 0.9) 100%);
            z-index: 1;
        }

        .menu-content {
            position: relative;
            z-index: 10;
            width: 400px;
            padding: 60px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border-left: 10px solid #000;
            box-shadow: -10px 0px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: right;
        }

        .game-logo {
            font-family: 'Bangers';
            font-size: 80px;
            line-height: 0.85;
            color: #fff;
            text-shadow: 6px 6px 0px #ff0055, 12px 12px 0px #000;
            margin: 0;
            text-transform: uppercase;
        }

        .game-sub {
            font-family: 'Montserrat';
            font-weight: 900;
            font-size: 16px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 10px;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btns {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-end;
        }

        .menu-btn {
            font-family: 'Bangers';
            font-size: 28px;
            width: 100%;
            max-width: 300px;
            padding: 12px 30px;
            background: #ffcc00;
            color: #000;
            border: 5px solid #000;
            cursor: pointer;
            box-shadow: 6px 6px 0px #ff0055;
            transition: 0.2s;
            transform: skewX(-5deg);
            text-align: center;
        }

        .menu-btn:hover {
            transform: skewX(-5deg) scale(1.05);
            box-shadow: 8px 8px 0px #000;
            background: #fff;
        }

        .play-btn {
            background: #ff0055;
            color: #fff;
            box-shadow: 6px 6px 0px #ffcc00;
        }

        @keyframes float {

            0%,
            100% {
                transform: rotate(-3deg) scale(1.1);
            }

            50% {
                transform: rotate(-1deg) scale(1.15);
            }
        }

        .game-ui {
            display: none;
            width: 100%;
            max-width: 900px;
        }

        /* Settings Menu */
        #settingsMenu {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .settings-panel {
            background: #fff;
            color: #000;
            border: 8px solid #000;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 15px 15px 0px #ff0055;
            transform: rotate(1deg);
        }

        .settings-title {
            font-family: 'Bangers';
            font-size: 48px;
            margin-bottom: 30px;
            border-bottom: 5px solid #000;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        .setting-row label {
            font-family: 'Bangers';
            font-size: 24px;
        }

        .setting-row input,
        .setting-row select {
            padding: 10px;
            font-family: 'Montserrat';
            font-weight: 700;
            border: 3px solid #000;
            flex: 1;
        }

        .settings-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader-content">
            <h1 class="comic-title">PREPARING PANELS...</h1>
            <div class="loader-bar">
                <div id="loaderFill"></div>
            </div>
            <p id="loaderStatus" class="comic-status">RENDERING HEROES...</p>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu">
        <div class="main-menu-overlay"></div>
        <div class="menu-content">
            <h1 class="game-logo" id="menuLogo">TERMINAL<br>CLASH</h1>
            <h2 class="game-sub" id="menuSub">Ultimate Domain Edition</h2>

            <div class="menu-btns">
                <button class="menu-btn play-btn" onclick="enterArena()">ENTER ARENA</button>
                <button class="menu-btn" onclick="openSettings()">SETTINGS</button>
            </div>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settingsMenu">
        <div class="settings-panel">
            <h2 class="settings-title">GAME SETTINGS</h2>

            <div class="setting-row">
                <label>LOGO TEXT</label>
                <input type="text" id="setLogoText" value="TERMINAL CLASH">
            </div>

            <div class="setting-row">
                <label>FONT STYLE</label>
                <select id="setFontStyle">
                    <option value="'Bangers', cursive">COMIC (BANGERS)</option>
                    <option value="'Montserrat', sans-serif">MODERN (MONTSERRAT)</option>
                    <option value="'Courier New', monospace">GLITCH (COURIER)</option>
                    <option value="'Georgia', serif">CLASSIC (GEORGIA)</option>
                </select>
            </div>

            <div class="setting-row">
                <label>SCREEN SHAKE</label>
                <input type="checkbox" id="setShake" checked style="width: 30px; height: 30px; accent-color: #ff0055;">
            </div>

            <div class="setting-row">
                <label>UI COLOR</label>
                <input type="color" id="setUiColor" value="#ff0055">
            </div>

            <div class="settings-btns">
                <button class="menu-btn" style="font-size: 24px; padding: 10px 30px;"
                    onclick="applySettings()">APPLY</button>
                <button class="menu-btn" style="font-size: 24px; padding: 10px 30px; background: #eee;"
                    onclick="closeSettings()">BACK</button>
            </div>
        </div>
    </div>

    <div id="gameUI" class="game-ui">
        <div class="hud">
            <div class="player-info p1-info">
                <div class="name-tag" id="p1Name">WAITING...</div>
                <div class="health-bar-bg">
                    <div class="health-bar-fill" id="p1Hp"></div>
                    <div class="health-text" id="p1HpText">0/0</div>
                </div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="player-info p2-info">
                <div class="name-tag" id="p2Name" style="flex-direction: row-reverse;">WAITING...</div>
                <div class="health-bar-bg">
                    <div class="health-bar-fill" id="p2Hp"></div>
                    <div class="health-text" id="p2HpText">0/0</div>
                </div>
            </div>
        </div>

        <div class="arena-container">
            <canvas id="arena" width="1000" height="562"></canvas>
            <div id="flashOverlay"></div>
            <div id="suddenDeath">SUDDEN<br>DEATH!</div>
        </div>

        <div class="bottom-panel">
            <div class="controls-container">
                <div class="selects">
                    <select id="p1Select"></select>
                    <span
                        style="font-family:'Bangers'; color:#ffcc00; font-size:22px; text-shadow:2px 2px 0px #000;">VS</span>
                    <select id="p2Select"></select>
                </div>
                <button onclick="startMatch()">NEXT FIGHT!</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-entry">Comic Engine Loaded... Choose your fighters!</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('logBox');
        const flashOverlay = document.getElementById('flashOverlay');

        const ui = {
            p1Name: document.getElementById('p1Name'), p1Hp: document.getElementById('p1Hp'), p1Text: document.getElementById('p1HpText'),
            p2Name: document.getElementById('p2Name'), p2Hp: document.getElementById('p2Hp'), p2Text: document.getElementById('p2HpText'),
            sdText: document.getElementById('suddenDeath')
        };

        // --- EXPANDED ROSTER ---
        const CLASSES = {
            DRIVER: { name: 'Driver', color: '#ff0055', r: 24, spd: 7.2, hp: 450, dmg: 40, mass: 6.0, emoji: '🏎️', cooldown: 180, skill: "Nitro Ram" },
            POLITICIAN: { name: 'Politician', color: '#ffcc00', r: 20, spd: 4.8, hp: 350, dmg: 20, mass: 1.5, emoji: '🤥', cooldown: 225, skill: "Tax Traps" },
            NINJA: { name: 'Ninja', color: '#00eeff', r: 18, spd: 6.6, hp: 300, dmg: 35, mass: 1.2, emoji: '🥷', cooldown: 135, skill: "Shuriken Flurry" },
            BOOMER: { name: 'Boomer', color: '#888888', r: 28, spd: 2.4, hp: 600, dmg: 30, mass: 6.0, emoji: '👴', cooldown: 300, skill: "Dynamite Toss" },
            DEALER: { name: 'Dealer', color: '#ffffff', r: 20, spd: 4.8, hp: 350, dmg: 15, mass: 1.5, emoji: '🃏', cooldown: 240, skill: "Draw Cards" },
            SPEEDBUMP: { name: 'Speedbump', color: '#ffaa00', r: 30, spd: 1.5, hp: 800, dmg: 45, mass: 9.0, emoji: '🚧', cooldown: 240, skill: "Deploy Bump" },
            VAMPIRE: { name: 'Vampire', color: '#cc0000', r: 22, spd: 4.2, hp: 280, dmg: 18, mass: 2.0, emoji: '🧛', cooldown: 360, skill: "Life Tether" },
            SNIPER: { name: 'Sniper', color: '#00cc44', r: 18, spd: 4.8, hp: 280, dmg: 35, mass: 1.2, emoji: '🎯', cooldown: 225, skill: "Trickshot" },
            BRAWLER: { name: 'Brawler', color: '#aa00ff', r: 22, spd: 4.2, hp: 450, dmg: 25, mass: 3.0, emoji: '🥊', cooldown: 210, skill: "Haymaker" },
            BANSHEE: { name: 'Banshee', color: '#99bbff', r: 20, spd: 4.2, hp: 360, dmg: 6, mass: 1.5, emoji: '👻', cooldown: 225, skill: "Sonic Shriek" },
            GRAVITY: { name: 'Gravity', color: '#222255', r: 24, spd: 3.0, hp: 500, dmg: 20, mass: 5.0, emoji: '🌌', cooldown: 240, skill: "Singularity Strike" },
            PYRO: { name: 'Pyro', color: '#ff6600', r: 22, spd: 4.2, hp: 380, dmg: 20, mass: 2.0, emoji: '🔥', cooldown: 225, skill: "Inferno" },
            GLITCH: { name: 'Glitch', color: '#00ff00', r: 20, spd: 5.4, hp: 320, dmg: 25, mass: 1.5, emoji: '👾', cooldown: 300, skill: "Code Corrupt" },
            POLYGON: { name: 'Polygon', color: '#ff00ff', r: 22, spd: 4.5, hp: 400, dmg: 10, mass: 2.5, emoji: '🔺', cooldown: 300, skill: "Prism Ray" },
            GUNSLINGER: { name: 'Gunslinger', color: '#8b4513', r: 22, spd: 4.6, hp: 340, dmg: 10, mass: 2.0, emoji: '🤠', cooldown: 260, skill: "High Noon" }
        };

        const NAMES = ['Zar', 'Vex', 'Grom', 'Jinx', 'Bane', 'Sylas', 'Rex', 'Kael', 'Nova', 'Chad', 'Luna', 'Drax', 'Gambit', 'Vlad', 'Omen', 'Flare'];

        const p1Select = document.getElementById('p1Select');
        const p2Select = document.getElementById('p2Select');
        let selectHTML = `<option value="RANDOM">🎲 Random</option>`;
        Object.keys(CLASSES).forEach(key => { selectHTML += `<option value="${key}">${CLASSES[key].emoji} ${CLASSES[key].name}</option>`; });
        p1Select.innerHTML = selectHTML; p2Select.innerHTML = selectHTML;

        let p1, p2;
        let matchTimer = 0; let isSuddenDeath = false; let screenShake = 0; let hitStopFrames = 0;
        let particles = []; let projectiles = []; let shockwaves = []; let floatingTexts = []; let actionWords = []; let effects = [];

        const rand = (min, max) => Math.random() * (max - min) + min;

        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerHTML = msg;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function triggerShake(intensity) { screenShake = Math.max(screenShake, intensity); }
        function flashScreen() {
            flashOverlay.style.opacity = '1';
            setTimeout(() => flashOverlay.style.opacity = '0', 100);
        }

        // ==========================================
        // VFX CLASSES
        // ==========================================
        class Particle {
            constructor(x, y, color, speed, life, size = 4, outline = true, shape = 'circle', falling = false) {
                this.x = x; this.y = y; this.color = color;
                this.falling = falling;
                let angle = rand(0, Math.PI * 2);
                if (this.falling) {
                    this.vx = rand(-1.5, 1.5);
                    this.vy = rand(2, 6);
                } else {
                    this.vx = Math.cos(angle) * speed * 0.6; this.vy = Math.sin(angle) * speed * 0.6;
                }
                this.life = life * 1.6; this.maxLife = life * 1.6; this.size = Math.max(0.1, size * 0.6); this.outline = outline;
                this.shape = shape;
                this.angle = angle;
                this.rotSpd = rand(-0.2, 0.2);

                if (this.shape === 'line') {
                    this.rotSpd = 0;
                    this.angle = 0;
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.falling) {
                    this.vy += 0.15; // gravity
                    this.vx *= 0.99; // slight air resistance on x
                } else {
                    this.vx *= 0.92; this.vy *= 0.92;
                }
                this.life--;
                this.angle += this.rotSpd;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;

                if (this.shape === 'circle') {
                    ctx.beginPath(); ctx.arc(0, 0, this.size, 0, Math.PI * 2); ctx.fill();
                    if (this.outline) { ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke(); }
                } else if (this.shape === 'square') {
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                    if (this.outline) { ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size); }
                } else if (this.shape === 'star') {
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos(i * Math.PI * 2 / 5) * this.size, Math.sin(i * Math.PI * 2 / 5) * this.size);
                        ctx.lineTo(Math.cos((i + 0.5) * Math.PI * 2 / 5) * this.size * 0.4, Math.sin((i + 0.5) * Math.PI * 2 / 5) * this.size * 0.4);
                    }
                    ctx.closePath(); ctx.fill();
                    if (this.outline) { ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke(); }
                } else if (this.shape === 'line') {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.size;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-this.vx * 2, -this.vy * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        function createExplosion(x, y, color, count, sizeMultiplier = 1) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, rand(5, 15) * sizeMultiplier, rand(15, 30), rand(4, 8) * sizeMultiplier, true, 'circle'));
                if (i % 4 === 0) particles.push(new Particle(x, y, '#fff', rand(8, 20) * sizeMultiplier, rand(10, 20), rand(2, 5), false, 'star'));
            }
        }

        class FloatingText {
            constructor(x, y, text, color, size = 20) {
                this.x = x + rand(-15, 15); this.y = y; this.text = text; this.color = color;
                this.size = size * 0.5; this.life = 60; this.vy = -1;
            }
            update() { this.y += this.vy; this.life--; }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.font = `900 ${this.size}px 'Montserrat'`;
                ctx.strokeStyle = '#000'; ctx.lineWidth = 5; ctx.lineJoin = 'round';
                ctx.strokeText(this.text, this.x, this.y); ctx.fillText(this.text, this.x, this.y);
            }
        }

        class ActionWord {
            constructor(x, y, text, scaleTarget = 1.0) {
                this.x = x; this.y = y; this.text = text;
                this.life = 45; this.scale = 0.1; this.scaleTarget = scaleTarget * 0.5;
                this.angle = rand(-0.4, 0.4);
                this.color = ['#ffcc00', '#00eeff', '#ff0055', '#00ff00'][Math.floor(rand(0, 4))];
            }
            update() {
                this.life--;
                if (this.life > 25) this.scale += (this.scaleTarget - this.scale) * 0.4;
                else this.scale += 0.01;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.scale(this.scale, this.scale);
                ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
                ctx.beginPath();
                for (let i = 0; i < 10; i++) {
                    let r = i % 2 === 0 ? 60 : 30; let a = (i / 10) * Math.PI * 2;
                    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = this.color; ctx.font = `40px 'Bangers'`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.strokeStyle = '#000'; ctx.lineWidth = 6; ctx.lineJoin = 'round';
                ctx.strokeText(this.text, 0, 5); ctx.fillText(this.text, 0, 5);
                ctx.restore();
            }
        }

        class Shockwave {
            constructor(x, y, color, maxRadius, dmg, owner) {
                this.x = x; this.y = y; this.color = color;
                this.radius = 10; this.maxRadius = maxRadius;
                this.dmg = dmg; this.owner = owner; this.hitFlag = false;
            }
            update(fighters) {
                this.radius += 15;
                if (!this.hitFlag) {
                    fighters.forEach(f => {
                        if (f === this.owner) return;
                        if (Math.hypot(f.x - this.x, f.y - this.y) < this.radius + f.r) {
                            f.takeDamage(this.dmg, "SHOCKWAVE");
                            if (f.classKey !== 'SPEEDBUMP') {
                                let ang = Math.atan2(f.y - this.y, f.x - this.x);
                                f.vx += Math.cos(ang) * 20; f.vy += Math.sin(ang) * 20;
                            }
                            actionWords.push(new ActionWord(f.x, f.y, "WHAM!"));
                            hitStopFrames = 4;
                        }
                    });
                    this.hitFlag = true;
                }
            }
            draw(ctx) {
                let alpha = Math.max(0, 1 - (this.radius / this.maxRadius));
                if (alpha <= 0) return;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#000'; ctx.lineWidth = 14;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke();
                ctx.strokeStyle = this.color; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function getCardRank(num) {
            if (num === 1) return 'A';
            if (num === 11) return 'J';
            if (num === 12) return 'Q';
            if (num >= 13) return 'K';
            return num.toString();
        }

        function drawRandomCard() {
            let rankNum = Math.floor(rand(1, 14));
            let rank = getCardRank(rankNum);
            let suit = ['♠', '♥', '♦', '♣'][Math.floor(rand(0, 4))];
            return { rank, suit };
        }

        // The house always wins — dealer draws smarter cards
        function drawDealerCard(currentHand) {
            let currentVal = getHandValue(currentHand);
            // Dealer peeks at the deck and avoids busting entirely
            for (let attempt = 0; attempt < 25; attempt++) {
                let card = drawRandomCard();
                let testHand = [...currentHand, card];
                let testVal = getHandValue(testHand);
                if (testVal <= 21) return card; // Safe card found
            }
            return drawRandomCard(); // Unlucky, take whatever comes
        }

        function getHandValue(cards) {
            if (!cards || cards.length === 0) return 0;
            let sum = 0; let aces = 0;
            for (let c of cards) {
                if (['J', 'Q', 'K'].includes(c.rank)) sum += 10;
                else if (c.rank === 'A') { sum += 11; aces++; }
                else sum += parseInt(c.rank);
            }
            while (sum > 21 && aces > 0) {
                sum -= 10; aces--;
            }
            return sum;
        }

        function drawCard(ctx, x, y, rank, suit, scale = 1.0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.rect(-30, -45, 60, 90);
            ctx.fill(); ctx.stroke();

            let color = (suit === '♥' || suit === '♦') ? '#f00' : '#000';
            ctx.fillStyle = color;

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = "900 24px 'Montserrat', sans-serif";
            ctx.fillText(rank, 0, -5);
            ctx.font = "30px Arial";
            ctx.fillText(suit, 0, 25);

            ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.font = "900 12px 'Montserrat', sans-serif";
            ctx.fillText(rank, -26, -42);
            ctx.font = "12px Arial";
            ctx.fillText(suit, -26, -30);

            ctx.save();
            ctx.rotate(Math.PI);
            ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.font = "900 12px 'Montserrat', sans-serif";
            ctx.fillText(rank, -26, -42);
            ctx.font = "12px Arial";
            ctx.fillText(suit, -26, -30);
            ctx.restore();

            ctx.restore();
        }

        class StaticEffect {
            constructor(x, y, type, life, extraData = {}) {
                this.x = x; this.y = y; this.type = type; this.life = life; this.maxLife = life;
                this.extraData = extraData;
            }
            update() { this.life--; }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.type === 'prism_beam') {
                    let beamLen = 2200;
                    ctx.rotate(this.extraData.angle);

                    // chaotic Branching Arcs
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    for (let i = 0; i < 8; i++) {
                        ctx.save();
                        ctx.rotate(rand(-1.5, 1.5));
                        ctx.globalAlpha = (this.life / this.maxLife) * 0.5;
                        ctx.beginPath(); ctx.moveTo(0, 0);
                        let curX = 0, curY = 0;
                        for (let j = 0; j < 5; j++) {
                            curX += rand(50, 200); curY += rand(-100, 100);
                            ctx.lineTo(curX, curY);
                        }
                        ctx.stroke(); ctx.restore();
                    }

                    // Volumetric Layers (INSANE TIER)
                    const layers = 6;
                    for (let i = 0; i < layers; i++) {
                        let w = this.extraData.width * (1.5 - i * 0.2) + Math.sin(Date.now() * 0.05 + i) * 10;
                        let grad = ctx.createLinearGradient(0, 0, beamLen, 0);
                        let alpha = (this.life / this.maxLife) * (1 / (i + 1));

                        let color1 = i % 2 === 0 ? `rgba(255, 0, 255, ${alpha})` : `rgba(0, 255, 255, ${alpha})`;
                        grad.addColorStop(0, color1);
                        grad.addColorStop(0.3, `rgba(255, 255, 255, ${alpha * 0.9})`);
                        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

                        ctx.fillStyle = grad;
                        ctx.shadowBlur = i === 0 ? 40 : 0; ctx.shadowColor = '#ff00ff';
                        ctx.fillRect(0, -w / 2, beamLen, w);
                    }

                    // Singularity Core
                    let coreSize = 60 * (this.life / this.maxLife);
                    let coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, coreSize);
                    coreGrad.addColorStop(0, '#fff'); coreGrad.addColorStop(0.2, '#fff');
                    coreGrad.addColorStop(0.5, '#ff00ff'); coreGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = coreGrad;
                    ctx.beginPath(); ctx.arc(0, 0, coreSize * 1.5, 0, Math.PI * 2); ctx.fill();

                    // Chromatic Internal Shards
                    for (let i = 0; i < 12; i++) {
                        ctx.fillStyle = i % 2 === 0 ? '#fff' : '#00ffff';
                        ctx.globalAlpha = rand(0.3, 0.8);
                        let lx = (Date.now() * (1 + i * 0.1) + i * 150) % beamLen;
                        ctx.fillRect(lx, -this.extraData.width, 40, this.extraData.width * 2);
                    }
                }
                ctx.restore();
            }
        }

        // ==========================================
        // EFFECTS
        // ==========================================
        class LifeTether {
            constructor(owner, target, life) { this.owner = owner; this.target = target; this.life = life; }
            update(fighters) {
                this.life--;
                if (this.owner && this.target && this.owner.hp > 0 && this.target.hp > 0) {
                    if (this.life % 10 === 0) {
                        this.target.takeDamage(8, "TETHER");
                        this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + 8);
                        if (this.life % 30 === 0) actionWords.push(new ActionWord(this.target.x, this.target.y, "SUCC!", 0.8));
                    }
                    if (this.target.classKey !== 'SPEEDBUMP') {
                        let ang = Math.atan2(this.owner.y - this.target.y, this.owner.x - this.target.x);
                        this.target.vx += Math.cos(ang) * 1.5; this.target.vy += Math.sin(ang) * 1.5;
                    }
                    let bAng = Math.atan2(this.owner.y - this.target.y, this.owner.x - this.target.x);
                    let dist = Math.hypot(this.owner.x - this.target.x, this.owner.y - this.target.y);
                    particles.push(new Particle(this.target.x + Math.cos(bAng) * 10, this.target.y + Math.sin(bAng) * 10, '#cc0000', rand(5, 10), dist / 5, 4, true, 'circle'));
                } else this.life = 0;
            }
            draw(ctx) {
                if (this.life <= 0 || !this.owner || !this.target || this.owner.hp <= 0 || this.target.hp <= 0) return;
                ctx.beginPath(); ctx.moveTo(this.owner.x, this.owner.y); ctx.lineTo(this.target.x, this.target.y);
                ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 6 + Math.sin(this.life * 0.5) * 4; ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 + Math.sin(this.life * 0.5) * 2; ctx.stroke();
            }
        }

        class BlackHole {
            constructor(x, y, owner) { this.x = x; this.y = y; this.owner = owner; this.life = 250; }
            update(fighters) {
                this.life--;
                fighters.forEach(f => {
                    if (f === this.owner) return;
                    let dist = Math.hypot(f.x - this.x, f.y - this.y);
                    if (f.classKey !== 'SPEEDBUMP' && dist > 10) {
                        let ang = Math.atan2(this.y - f.y, this.x - f.x);
                        f.vx += Math.cos(ang) * 2.5; f.vy += Math.sin(ang) * 2.5;
                        f.vx *= 0.85; f.vy *= 0.85;
                    }
                    if (dist < 50 && this.life % 10 === 0) {
                        f.takeDamage(12, "GRAVITY");
                        triggerShake(4);
                    }
                });
                projectiles.forEach(p => {
                    if (Math.hypot(p.x - this.x, p.y - this.y) < 60 && p.type !== 'card') {
                        p.active = false;
                        particles.push(new Particle(p.x, p.y, '#aa00ff', 0, 10, 5, false, 'star'));
                    }
                });
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.life * -0.1);

                let gradient = ctx.createRadialGradient(0, 0, 20, 0, 0, 80);
                gradient.addColorStop(0, 'rgba(0,0,0,1)');
                gradient.addColorStop(0.2, 'rgba(170,0,255,0.8)');
                gradient.addColorStop(0.8, 'rgba(0,238,255,0.2)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.fillStyle = gradient;
                ctx.beginPath(); ctx.ellipse(0, 0, 90 + Math.sin(this.life * 0.1) * 10, 40, 0, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = '#000'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

                ctx.restore();

                for (let i = 0; i < 4; i++) {
                    let a = rand(0, Math.PI * 2); let r = rand(40, 120);
                    particles.push(new Particle(this.x + Math.cos(a) * r, this.y + Math.sin(a) * r, ['#fff', '#aa00ff', '#00eeff'][Math.floor(rand(0, 3))], 0, 10, 2, false));
                }
            }
        }

        class LaserSight {
            constructor(owner, target, life) { this.owner = owner; this.target = target; this.life = life; }
            update(fighters) { this.life--; }
            draw(ctx) {
                if (this.life <= 0 || !this.owner || !this.target) return;
                ctx.beginPath(); ctx.moveTo(this.owner.x, this.owner.y); ctx.lineTo(this.target.x, this.target.y);
                ctx.strokeStyle = `rgba(255,0,0,${this.life / 30})`; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        class GlitchBeam {
            constructor(owner, target) { this.owner = owner; this.target = target; this.life = 20; }
            update(fighters) { this.life--; }
            draw(ctx) {
                if (this.life <= 0 || !this.owner || !this.target) return;
                ctx.save();
                // Main Beam (Jagged)
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = rand(2, 20);
                ctx.beginPath(); ctx.moveTo(this.owner.x, this.owner.y);
                for (let i = 1; i < 5; i++) {
                    let lx = this.owner.x + (this.target.x - this.owner.x) * (i / 5) + rand(-20, 20);
                    let ly = this.owner.y + (this.target.y - this.owner.y) * (i / 5) + rand(-20, 20);
                    ctx.lineTo(lx, ly);
                }
                ctx.lineTo(this.target.x, this.target.y); ctx.stroke();

                // Pixel Displacement Blocks
                for (let i = 0; i < 12; i++) {
                    let ratio = Math.random();
                    let lx = this.owner.x + (this.target.x - this.owner.x) * ratio;
                    let ly = this.owner.y + (this.target.y - this.owner.y) * ratio;
                    ctx.fillStyle = ['#0f0', '#ff00ff', '#ffffff'][Math.floor(Math.random() * 3)];
                    ctx.fillRect(lx - 20, ly - 20, rand(10, 60), rand(2, 10));
                }
                ctx.restore();
            }
        }

        class GlitchPopup {
            constructor(x, y, text) {
                this.x = x; this.y = y; this.text = text;
                this.life = 30; this.type = 'glitch_popup';
            }
            update(fighters) { this.life--; }
            draw(ctx) {
                ctx.save();
                ctx.fillStyle = '#000'; ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
                ctx.fillRect(this.x - 100, this.y - 30, 200, 60);
                ctx.strokeRect(this.x - 100, this.y - 30, 200, 60);
                ctx.fillStyle = '#0f0'; ctx.font = "900 12px monospace"; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("[!] " + this.text, this.x, this.y);
                ctx.restore();
            }
        }


        // ==========================================
        // PROJECTILES
        // ==========================================
        class Projectile {
            constructor(x, y, vx, vy, type, owner, dmg, extraData = null) {
                this.x = x; this.y = y; this.vx = vx * 0.6; this.vy = vy * 0.6;
                this.type = type; this.owner = owner; this.dmg = dmg;
                this.active = true;

                if (type === 'bump' || type === 'tax') this.life = 960;
                else if (type === 'singularity') this.life = 150;
                else if (type === 'fire_trail') this.life = 96;
                else if (type === 'flame_proj') this.life = 48;
                else if (type === 'fist') this.life = 16;
                else this.life = 400;


                this.angle = Math.atan2(vy, vx);
                this.extraData = extraData;
            }
            update(fighters) {
                this.life--;
                if (this.life <= 0) { this.active = false; return; }

                if (this.type === 'stuck_shuriken') {
                    if (this.target && this.target.hp > 0 && !this.target.isPhased) {
                        this.x = this.target.x + this.extraData.offsetX;
                        this.y = this.target.y + this.extraData.offsetY;
                    } else {
                        this.active = false;
                    }
                    return; // Sticking handles its own update
                }

                if (this.type === 'dynamite') {
                    this.vx *= 0.96; this.vy *= 0.96;
                    if (this.life === 1) {
                        createExplosion(this.x, this.y, '#ff6600', 80, 2.5);
                        let sw = new Shockwave(this.x, this.y, '#ff0000', 200, 0, this.owner);
                        sw.hitFlag = true; shockwaves.push(sw);
                        triggerShake(20); hitStopFrames = 6;
                        actionWords.push(new ActionWord(this.x, this.y, "KABOOM!", 1.5));
                        fighters.forEach(f => {
                            if (f === this.owner) return;
                            if (Math.hypot(f.x - this.x, f.y - this.y) < 150) {
                                let dmgMod = f.classKey === 'BOOMER' ? 0.7 : 1;
                                f.takeDamage(60 * dmgMod, "EXPLOSION");
                                f.applyStatus('burn', 120);
                                if (f.classKey !== 'SPEEDBUMP') {
                                    let ang = Math.atan2(f.y - this.y, f.x - this.x);
                                    f.vx += Math.cos(ang) * 25; f.vy += Math.sin(ang) * 25;
                                }
                            }
                        });
                    }
                } else if (this.type === 'landmine') {
                    this.life = 999;
                    fighters.forEach(f => {
                        if (f === this.owner) return;
                        if (Math.hypot(f.x - this.x, f.y - this.y) < f.r + 20) {
                            f.takeDamage(100, "MINEFIELD");
                            actionWords.push(new ActionWord(f.x, f.y, "KABOOM!", 3.0));
                            createExplosion(f.x, f.y, '#ff6600', 150, 5.0);
                            let sw = new Shockwave(f.x, f.y, '#ff6600', 400, 0, this.owner);
                            sw.hitFlag = true; shockwaves.push(sw);
                            triggerShake(60); flashScreen();

                            setTimeout(() => { if (f) { createExplosion(f.x + rand(-50, 50), f.y + rand(-50, 50), '#ff0000', 100, 3.0); triggerShake(20); } }, 200);
                            setTimeout(() => { if (f) { createExplosion(f.x + rand(-50, 50), f.y + rand(-50, 50), '#ffcc00', 100, 3.0); triggerShake(20); } }, 400);

                            this.active = false;

                            // End the domain state early since they triggered the mine
                            if (this.owner && this.owner.mineState) {
                                this.owner.mineTick = 590;
                            }
                        }
                    });
                    if (!this.active) return;
                } else if (this.type === 'card') {
                    this.angle += 0.4;
                    if (this.life % 2 === 0) particles.push(new Particle(this.x, this.y, '#fff', rand(1, 3), 15, 3, false, 'star'));
                    let enemy = fighters.find(f => f !== this.owner);
                    if (enemy) {
                        let tAng = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        this.vx += Math.cos(tAng) * 4.0;
                        this.vy += Math.sin(tAng) * 4.0;
                        let speed = Math.hypot(this.vx, this.vy);
                        if (speed > 25) { this.vx = (this.vx / speed) * 25; this.vy = (this.vy / speed) * 25; }
                    }
                } else if (this.type === 'shuriken') {
                    if (this.vx !== 0 || this.vy !== 0) {
                        this.angle += 0.4;
                        if (this.x <= 5 || this.x >= canvas.width - 5 || this.y <= 5 || this.y >= canvas.height - 5) {
                            this.vx = 0; this.vy = 0;
                            this.x = Math.max(5, Math.min(canvas.width - 5, this.x));
                            this.y = Math.max(5, Math.min(canvas.height - 5, this.y));
                            createExplosion(this.x, this.y, '#aaa', 5, 0.5);
                            this.life = Math.min(this.life, 90); // disappear shortly after sticking
                        }
                    }
                } else if (this.type === 'sonic') {
                    this.extraData += 2;
                } else if (this.type === 'tax') {
                    let enemy = fighters.find(f => f !== this.owner);
                    if (enemy) {
                        let tAng = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        this.vx += Math.cos(tAng) * 0.4; this.vy += Math.sin(tAng) * 0.4;
                        let speed = Math.hypot(this.vx, this.vy);
                        if (speed > 12) { this.vx = (this.vx / speed) * 12; this.vy = (this.vy / speed) * 12; }
                    }
                    if (this.life % 3 === 0) particles.push(new Particle(this.x, this.y, '#00ff00', 0, 10, 4, false, 'square'));
                } else if (this.type === 'speech_bubble') {
                    this.life = 999;
                    this.angle += 0.05;
                    this.x += this.vx; this.y += this.vy;
                    // Wall Bounces
                    if (this.x < 0 || this.x > canvas.width) { this.vx *= -1; this.x = Math.max(0, Math.min(canvas.width, this.x)); }
                    if (this.y < 0 || this.y > canvas.height) { this.vy *= -1; this.y = Math.max(0, Math.min(canvas.height, this.y)); }

                    fighters.forEach(f => {
                        if (f === this.owner) return;
                        if (Math.hypot(f.x - this.x, f.y - this.y) < f.r + 15) {
                            f.takeDamage(0.8, "PROPAGANDA"); // Constant wearing down
                            if (f.tick % 8 === 0) {
                                let sym = ["?", "!", "@", "#"][Math.floor(Math.random() * 4)];
                                particles.push(new Particle(f.x + rand(-30, 30), f.y - 40, sym, rand(2, 4), 30, 2, false, 'emoji'));
                            }
                            // Deflection bounce
                            let ang = Math.atan2(this.y - f.y, this.x - f.x);
                            this.vx = Math.cos(ang) * 7;
                            this.vy = Math.sin(ang) * 7;
                        }
                    });
                } else if (this.type === 'singularity') {
                    this.angle += 0.2;
                    fighters.forEach(f => {
                        if (f === this.owner) return;
                        if (Math.hypot(f.x - this.x, f.y - this.y) < f.r + 20) {
                            f.takeDamage(this.dmg, "SINGULARITY");
                            f.pressureTimer = 180;
                            actionWords.push(new ActionWord(f.x, f.y, "CRUSHED!", 2.2));
                            triggerShake(25); flashScreen();
                            shockwaves.push(new Shockwave(this.x, this.y, '#222255', 250, 20, this.owner));
                            createExplosion(this.x, this.y, '#222255', 40, 2.5);
                            this.active = false;
                        }
                    });
                    // Wall detonation
                    if (this.x < 10 || this.x > canvas.width - 10 || this.y < 10 || this.y > canvas.height - 10) {
                        shockwaves.push(new Shockwave(this.x, this.y, '#222255', 200, 20, this.owner));
                        createExplosion(this.x, this.y, '#222255', 20, 1.5);
                        this.active = false;
                    }
                }

                if (!['bump', 'tax', 'speech_bubble'].includes(this.type)) {
                    this.x += this.vx; this.y += this.vy;
                }

                // Deflection (Speedbump Passive)
                if (!['card', 'bump', 'tax', 'sonic', 'flame_proj', 'fire_trail', 'fist'].includes(this.type)) {
                    let target = fighters.find(f => f !== this.owner && f.classKey === 'SPEEDBUMP');
                    if (target && Math.hypot(target.x - this.x, target.y - this.y) < target.r + 15) {
                        if (this.deflectRolled !== target) {
                            this.deflectRolled = target;
                            this.deflectSuccess = Math.random() < 0.35;
                            if (!this.deflectSuccess) floatingTexts.push(new FloatingText(this.x, this.y, "MISS!", "#ffffff"));
                        }
                        if (this.deflectSuccess) {
                            this.vx *= -1; this.vy *= -1; this.owner = target;
                            floatingTexts.push(new FloatingText(this.x, this.y, "DEFLECT!", "#ffaa00"));
                            return;
                        }
                    }
                }

                // Wall Bounces
                if (!['card', 'bump', 'tax', 'sonic', 'flame_proj', 'fire_trail', 'fist', 'bullet', 'shuriken', 'stuck_shuriken'].includes(this.type)) {
                    if (this.x < 0 || this.x > canvas.width) { this.vx *= -1; createExplosion(this.x, this.y, '#fff', 3, 0.5); }
                    if (this.y < 0 || this.y > canvas.height) { this.vy *= -1; createExplosion(this.x, this.y, '#fff', 3, 0.5); }
                } else if (this.type === 'bullet') {
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.active = false;
                        createExplosion(this.x, this.y, '#fff', 8, 1);
                    }
                }

                // Collisions
                if (this.type !== 'fist') {
                    fighters.forEach(f => {
                        if (f === this.owner) return;
                        if (f.isPhased && this.type !== 'card') return;

                        let hitRadius = (this.type === 'bump' || this.type === 'tax') ? 25 : (this.type === 'sonic') ? this.extraData : 15;

                        if (Math.hypot(f.x - this.x, f.y - this.y) < f.r + hitRadius) {

                            let dmgMod = f.classKey === 'BOOMER' ? 0.7 : 1;

                            if (this.type === 'dynamite') {
                                this.life = 2; // Immediately trigger explosion frame next tick
                            } else if (this.type === 'bump') {
                                let speed = Math.hypot(f.vx, f.vy);
                                f.takeDamage((5 + (speed * 4)) * dmgMod, "SPEEDBUMP");
                                f.applyStatus('stun', 60);
                                actionWords.push(new ActionWord(this.x, this.y, "CRASH!"));
                                triggerShake(10); createExplosion(this.x, this.y, '#ffcc00', 30, 2);
                                for (let i = 0; i < 8; i++) particles.push(new Particle(this.x, this.y, '#fff', rand(5, 15), 20, 6, false, 'line'));
                                this.active = false;
                            } else if (this.type === 'tax') {
                                f.takeDamage(this.dmg * dmgMod, "TAX");
                                if (this.owner && this.owner.hp > 0) this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + this.dmg);
                                actionWords.push(new ActionWord(this.x, this.y, "AUDIT!"));
                                createExplosion(this.x, this.y, '#00ff00', 15, 1.5);
                                this.active = false;
                            } else if (this.type === 'sonic' || this.type === 'flame_proj' || this.type === 'fire_trail') {
                                if (this.life % 5 === 0) {
                                    f.takeDamage(this.dmg * dmgMod, this.type);
                                    if (this.type === 'sonic' && f.classKey !== 'SPEEDBUMP') {
                                        f.vx += this.vx * 0.1; f.vy += this.vy * 0.1;
                                    }
                                    if (this.type === 'flame_proj' || this.type === 'fire_trail') f.applyStatus('burn', 60);
                                }
                            } else if (this.type === 'shuriken') {
                                f.applyStatus('bleed', 200); // Massive bleeding
                                this.type = 'stuck_shuriken';
                                this.target = f;
                                this.extraData = { offsetX: this.x - f.x, offsetY: this.y - f.y };
                                this.life = 200; // Stick for a while
                                actionWords.push(new ActionWord(this.x, this.y, "STUCK!", 0.8));
                                createExplosion(this.x, this.y, '#f00', 5, 0.5);
                            } else {
                                let finalDmg = this.dmg;
                                if (this.type === 'bullet' && this.owner.classKey === 'SNIPER') {
                                    let dist = Math.hypot(this.owner.x - f.x, this.owner.y - f.y);
                                    finalDmg *= (1 + (dist / 500));
                                }

                                f.takeDamage(finalDmg * dmgMod, "PROJ");
                                createExplosion(this.x, this.y, this.owner.color, 15, 1.2);

                                if (this.type === 'bullet') actionWords.push(new ActionWord(this.x, this.y, "PEW!"));
                                else if (this.type === 'card' && this.dmg > 30) {
                                    actionWords.push(new ActionWord(this.x, this.y, "JACKPOT!", 1.2));
                                    triggerShake(10); hitStopFrames = 4;
                                }
                                else if (finalDmg >= 20) actionWords.push(new ActionWord(this.x, this.y, "BAM!"));

                                this.active = false;
                            }
                        }
                    });
                }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y);
                if (!['flame_proj', 'fire_trail', 'fist'].includes(this.type)) ctx.rotate(this.angle);

                ctx.lineWidth = 3; ctx.strokeStyle = '#000';

                if (this.type === 'shuriken' || this.type === 'stuck_shuriken') {
                    ctx.fillStyle = '#ddd';
                    if (this.type === 'shuriken') ctx.rotate(this.angle * 2);
                    else ctx.rotate(this.angle); // retain stuck angle without spinning
                    ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(4, -4); ctx.lineTo(18, 0); ctx.lineTo(4, 4);
                    ctx.lineTo(0, 18); ctx.lineTo(-4, 4); ctx.lineTo(-18, 0); ctx.lineTo(-4, -4); ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();
                } else if (this.type === 'dynamite') {
                    ctx.fillStyle = '#ff0055'; ctx.fillRect(-8, -18, 16, 36); ctx.strokeRect(-8, -18, 16, 36);
                    ctx.fillStyle = '#fff'; ctx.fillRect(-2, -25, 4, 7);
                    if (this.life % 10 < 5) { ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(0, -28, 8, 0, Math.PI * 2); ctx.fill(); }
                    ctx.fillStyle = '#000'; ctx.font = '900 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('TNT', 0, 0);
                    if (Math.random() < 0.5) particles.push(new Particle(this.x + Math.cos(this.angle) * 20, this.y + Math.sin(this.angle) * 20, '#ffcc00', rand(1, 3), 10, 3, false, 'star'));
                } else if (this.type === 'speech_bubble') {
                    ctx.save();
                    let rhetoric = ["VOTE!", "LIE!", "FAKE!", "FUTURE!", "TRUST!"][Math.floor((Date.now() / 500) % 5)];
                    let glitchX = Math.sin(Date.now() * 0.1) * 2;

                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.ellipse(glitchX, 0, 18, 14, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-5, 12); ctx.lineTo(-15, 22); ctx.lineTo(4, 13); ctx.fill(); ctx.stroke();

                    ctx.fillStyle = (Date.now() % 400 < 200) ? '#ff0000' : '#0000ff';
                    ctx.font = '900 10px Montserrat'; ctx.textAlign = 'center';
                    ctx.fillText(rhetoric, glitchX, 4);

                    // Corruption trail
                    if (Math.random() < 0.2) {
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.fillRect(-25, -5, 10, 2);
                    }
                    ctx.restore();
                } else if (this.type === 'landmine') {
                    ctx.fillStyle = '#1c1c1c'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    if (Date.now() % 500 < 250) { ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill(); }
                } else if (this.type === 'bump') {
                    ctx.fillStyle = '#ffcc00'; let w = 50, h = 20;
                    ctx.fillRect(-w / 2, -h / 2, w, h); ctx.strokeRect(-w / 2, -h / 2, w, h);
                    ctx.fillStyle = '#000';
                    for (let i = -2; i <= 2; i++) {
                        ctx.beginPath();
                        ctx.moveTo(i * 10 - 5, -h / 2);
                        ctx.lineTo(i * 10 + 5, -h / 2);
                        ctx.lineTo(i * 10 + -5, h / 2);
                        ctx.lineTo(i * 10 - 15, h / 2);
                        ctx.fill();
                    }
                    if (Date.now() % 500 < 250) {
                        ctx.fillStyle = '#f00';
                        ctx.beginPath(); ctx.arc(-w / 2 + 5, -h / 2 - 5, 4, 0, Math.PI * 2); ctx.fill();
                        ctx.beginPath(); ctx.arc(w / 2 - 5, -h / 2 - 5, 4, 0, Math.PI * 2); ctx.fill();
                    }
                } else if (this.type === 'tax') {
                    ctx.fillStyle = '#00ff00';
                    ctx.scale(Math.cos(this.life * 0.2), 1);
                    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#000'; ctx.font = '900 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('$', 0, 2);
                } else if (this.type === 'bullet') {
                    let isGold = this.extraData === 'gold';
                    ctx.fillStyle = isGold ? '#ffcc00' : '#fff'; 
                    ctx.strokeStyle = isGold ? '#ff8800' : '#ffff00'; 
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(25, 0); ctx.lineTo(-15, -4); ctx.lineTo(-15, 4); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.ellipse(-15, 0, 4, 10, 0, 0, Math.PI * 2); ctx.stroke();
                    if (isGold) {
                         for(let i=0; i<3; i++) particles.push(new Particle(this.x, this.y, '#ffd700', rand(1,3), 5, 2, false));
                    }
                } else if (this.type === 'card') {
                    ctx.fillStyle = '#fff'; ctx.fillRect(-10, -14, 20, 28); ctx.strokeRect(-10, -14, 20, 28);
                    ctx.fillStyle = (this.extraData === '♥' || this.extraData === '♦') ? '#ff0000' : '#000';
                    ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.extraData, 0, 0);
                } else if (this.type === 'singularity') {
                    // Pulse Aura
                    ctx.fillStyle = '#222255'; ctx.globalAlpha = 0.3;
                    ctx.beginPath(); ctx.arc(0, 0, 20 + Math.sin(Date.now() * 0.01) * 5, 0, Math.PI * 2); ctx.fill();
                    // Event Horizon
                    ctx.globalAlpha = 1.0;
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.stroke();
                    // Core
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
                    // Inner Pulse
                    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.02) * 0.5;
                    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
                } else if (this.type === 'sonic') {
                    ctx.globalAlpha = this.life / 60;
                    ctx.strokeStyle = '#00eeff'; ctx.lineWidth = 8;
                    ctx.beginPath(); ctx.arc(0, 0, this.extraData, -Math.PI / 4, Math.PI / 4); ctx.stroke();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(0, 0, this.extraData - 8, -Math.PI / 5, Math.PI / 5); ctx.stroke();
                    ctx.globalAlpha = 1;
                } else if (this.type === 'fire_trail' || this.type === 'flame_proj') {
                    ctx.globalAlpha = this.life / (this.type === 'fire_trail' ? 60 : 30);
                    ctx.fillStyle = '#ff3300';
                    let r = this.extraData + (this.type === 'fire_trail' ? Math.sin(this.life * 0.2) * 5 : 0);
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        let ang = (i / 8) * Math.PI * 2 + this.life * 0.1;
                        let d = r * (i % 2 === 0 ? 1 : 0.6);
                        ctx.lineTo(Math.cos(ang) * d, Math.sin(ang) * d);
                    }
                    ctx.closePath(); ctx.fill();

                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        let ang = (i / 8) * Math.PI * 2 - this.life * 0.1;
                        let d = (r * 0.6) * (i % 2 === 0 ? 1 : 0.6);
                        ctx.lineTo(Math.cos(ang) * d, Math.sin(ang) * d);
                    }
                    ctx.closePath(); ctx.fill();
                    ctx.globalAlpha = 1;
                    if (this.life % 4 === 0) particles.push(new Particle(this.x, this.y, '#333', rand(0.5, 1.5), 20, 5, false, 'circle'));
                } else if (this.type === 'fist') {
                    ctx.rotate(this.extraData);
                    ctx.fillStyle = '#ffcc00'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(0, 0, 18 + this.life, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#fff';
                    for (let i = -1; i <= 1; i++) {
                        ctx.beginPath(); ctx.arc(10, i * 8, 4, 0, Math.PI * 2); ctx.fill();
                    }
                }
                ctx.restore();
            }
        }

        // ==========================================
        // FIGHTER ENTITY
        // ==========================================
        class Fighter {
            constructor(side, chosenClass = "RANDOM") {
                const keys = Object.keys(CLASSES);
                this.classKey = chosenClass === "RANDOM" ? keys[Math.floor(Math.random() * keys.length)] : chosenClass;
                const stats = CLASSES[this.classKey];

                this.side = side; this.name = NAMES[Math.floor(Math.random() * NAMES.length)];
                this.emoji = stats.emoji; this.color = stats.color;
                this.r = stats.r; this.mass = stats.mass;
                this.maxHp = stats.hp; this.hp = this.maxHp;
                this.dmg = stats.dmg; this.baseSpd = stats.spd;

                this.skillCooldownMax = stats.cooldown;
                this.skillCooldown = rand(30, stats.cooldown);
                this.sides = 3;
                this.visualRotation = 0;
                this.polyState = null; this.polyTick = 0;
                this.pressureTimer = 0;
                this.skillName = stats.skill;

                this.statuses = { burn: 0, poison: 0, stun: 0, bleed: 0 };
                this.flashFrames = 0; this.trail = [];

                this.isPhased = false; this.phaseTimer = 0;
                this.phaseShield = 0; this.phaseActiveTimer = 0;

                // Visual Smoothing
                this.visualWeaponAngle = 0;
                this.visualEyeAngle = 0;
                this.visualScale = 1.0;
                this.heat = 0; this.flameThrowing = 0;
                this.brawlerAdrenaline = 0;
                this.orbitingCards = []; this.throwTimer = 0;
                this.orbitalAngle = 0;

                this.rapidPunching = 0;
                this.shriekTimer = 0;
                this.shriekState = null;
                this.shriekTick = 0;
                this.shadowCopies = [];
                this.chargeTimer = 0;
                this.blackJackTimer = 0;
                this.dealerCardNum = 0;
                this.enemyCardNum = 0;
                this.electionState = null;
                this.electionTick = 0;
                this.electionVotes = 0;
                this.dojoState = null;
                this.dojoTick = 0;
                this.dojoKi = 0;
                this.dragRaceState = null;
                this.dragRaceTick = 0;
                this.dragRaceProgress = 0;
                this.target = null;
                this.nitro = 0;
                this.tick = 0;
                this.domainEntranceTick = 0;
                this.infernoState = null;
                this.infernoTick = 0;
                this.lavaLevel = 0;
                this.glitchState = null;
                this.glitchTick = 0;
                this.gravityState = null;
                this.gravityTick = 0;
                this.highNoonState = null;
                this.highNoonTick = 0;
                this.fanShotsRemaining = 0;
                this.fanCooldown = 0;
                this.quickdrawBuff = 0;
                this.x = side === 'p1' ? 150 : canvas.width - 150;
                this.y = canvas.height / 2 + rand(-50, 50);

                let angle = side === 'p1' ? rand(-0.5, 0.5) : rand(Math.PI - 0.5, Math.PI + 0.5);
                this.vx = Math.cos(angle) * this.baseSpd;
                this.vy = Math.sin(angle) * this.baseSpd;
            }

            takeDamage(amount, source) {
                if (this.isPhased) {
                    this.phaseShield -= amount;
                    floatingTexts.push(new FloatingText(this.x, this.y, "BLOCKED!", "#99bbff"));
                    if (this.phaseShield <= 0) {
                        this.isPhased = false;
                        actionWords.push(new ActionWord(this.x, this.y, "PHASE BROKEN!", 1.5));
                        createExplosion(this.x, this.y, '#99bbff', 15, 1.0);
                    }
                    return;
                }

                if (this.classKey === 'NINJA' && amount >= this.hp && this.hp > 1) {
                    this.hp = 1; this.x = rand(100, canvas.width - 100); this.y = rand(100, canvas.height - 100);
                    floatingTexts.push(new FloatingText(this.x, this.y, "SUBSTITUTION!", "#00eeff", 24));
                    createExplosion(this.x, this.y, '#8b4513', 20, 1.5);
                    return;
                }

                if (this.classKey === 'BRAWLER') {
                    this.brawlerAdrenaline = 120;
                    floatingTexts.push(new FloatingText(this.x, this.y - 20, "ADRENALINE!", "#aa00ff"));
                }

                if (this.classKey === 'GUNSLINGER') {
                    this.quickdrawBuff = 120;
                    this.vx *= 1.5; this.vy *= 1.5; // Quick escape
                    floatingTexts.push(new FloatingText(this.x, this.y - 20, "QUICKDRAW!", "#ffcc00"));
                    for(let i=0; i<5; i++) particles.push(new Particle(this.x, this.y, '#ffcc00', rand(1,3), 15, 5, false, 'star'));
                }

                this.hp -= amount;
                this.flashFrames = 5;

                let dmgColor = '#fff';
                if (source === 'CLASH') dmgColor = '#ffcc00';
                else if (source === 'EXPLOSION') dmgColor = '#ff6600';
                else if (source === 'PUNCH') dmgColor = '#aa00ff';
                else if (source === 'GRAVITY') dmgColor = '#9900ff';
                else if (source === 'GLITCH') dmgColor = '#00ff00';
                else if (source === 'BURN' || source === 'flame_proj' || source === 'fire_trail') dmgColor = '#ff3300';
                else if (source === 'TETHER') dmgColor = '#cc0000';
                else if (source === 'POISON') dmgColor = '#aa00ff';

                floatingTexts.push(new FloatingText(this.x, this.y, `-${Math.floor(amount)}`, dmgColor, amount > 30 ? 40 : (amount > 15 ? 28 : 20)));
            }

            applyStatus(type, duration) {
                if (this.isPhased) return;
                this.statuses[type] = duration;
                floatingTexts.push(new FloatingText(this.x, this.y - 25, type.toUpperCase(), this.color, 24));
            }

            useAbility(target) {
                log(`💥 <span style="color:${this.color}">${this.name}</span> uses <b>${this.skillName}</b>!`, 'log-ability');

                let enemy = target ? target : (p1 === this ? p2 : p1);
                if (enemy && enemy.classKey === 'DEALER' && enemy.hp > 0) {
                    enemy.hp = Math.min(enemy.maxHp, enemy.hp + 10);
                    floatingTexts.push(new FloatingText(enemy.x, enemy.y, "+10 (HOUSE EDGE)", "#fff"));
                }

                switch (this.classKey) {
                    case 'DRIVER':
                        if (Math.random() < 0.15 && enemy) {
                            // DRAG RACE!
                            this.dragRaceState = 'countdown';
                            this.dragRaceTick = 0;
                            this.dragRaceProgress = 0;
                            enemy.dragRaceProgress = 0;
                            this.drSavedX = this.x; this.drSavedY = this.y;
                            enemy.drSavedX = enemy.x; enemy.drSavedY = enemy.y;
                            this.drSavedVx = this.vx; this.drSavedVy = this.vy;
                            enemy.drSavedVx = enemy.vx; enemy.drSavedVy = enemy.vy;
                            this.x = canvas.width * 0.15; this.y = canvas.height * 0.45;
                            enemy.x = canvas.width * 0.15; enemy.y = canvas.height * 0.7;
                            this.vx = 0; this.vy = 0; enemy.vx = 0; enemy.vy = 0;
                            actionWords.push(new ActionWord(canvas.width / 2, canvas.height / 2, "DRAG RACE!", 2.5));
                            triggerShake(20); flashScreen();
                        } else {
                            let ang = Math.atan2(this.vy, this.vx);
                            this.vx = Math.cos(ang) * 27; this.vy = Math.sin(ang) * 27;
                            this.applyStatus('burn', 20);
                            this.nitro = 20;
                            triggerShake(8);
                            actionWords.push(new ActionWord(this.x, this.y, "VROOM!", 1.5));
                        }
                        break;
                    case 'POLITICIAN':
                        if (Math.random() < 0.15 && enemy) {
                            // ELECTION DEBATE DOMAIN
                            this.electionState = 'active';
                            this.electionTick = 0;
                            this.electionVotes = 0;
                            enemy.electionVotes = 0;

                            // Save original positions
                            this.elecSavedX = this.x; this.elecSavedY = this.y;
                            enemy.elecSavedX = enemy.x; enemy.elecSavedY = enemy.y;
                            this.elecSavedVx = this.vx; this.elecSavedVy = this.vy;
                            enemy.elecSavedVx = enemy.vx; enemy.elecSavedVy = enemy.vy;

                            // Teleport to stage
                            this.x = canvas.width * 0.3; this.y = canvas.height * 0.6;
                            enemy.x = canvas.width * 0.7; enemy.y = canvas.height * 0.6;
                            this.vx = 0; this.vy = 0; enemy.vx = 0; enemy.vy = 0;

                            actionWords.push(new ActionWord(canvas.width / 2, canvas.height / 2, "NATIONAL DEBATE!", 2.5));
                            triggerShake(20); flashScreen();
                            this.domainEntranceTick = 40;
                        } else {
                            const curBubbles = projectiles.filter(p => p.type === 'speech_bubble' && p.owner === this).length;
                            if (curBubbles < 12) {
                                let numToSpawn = Math.min(3, 12 - curBubbles);

            update(fighters) {
                let enemy = fighters.find(f => f !== this);

                if (this.dancing) {
                    if (this.tick % 2 === 0) {
                        let colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff', '#fff'];
