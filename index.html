                // === EVENT HORIZON RENDERING ===
                let grFighter = fighters.find(f => f.gravityState && f.gravityState !== 'done');

                // Space background
                ctx.fillStyle = '#010105';
                ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);

                // Swirling Void
                let cx = canvas.width / 2; let cy = canvas.height / 2;
                let rot = Date.now() * 0.001;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(rot);
                for (let i = 0; i < 50; i++) {
                    let d = (i * 20 + Date.now() * 0.05) % 800;
                    let a = i * 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${1 - d / 800})`;
                    ctx.beginPath(); ctx.arc(Math.cos(a) * d, Math.sin(a) * d, 2, 0, Math.PI * 2); ctx.fill();
                }
                // Event Horizon Core
                let grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 300);
                grad.addColorStop(0, '#000');
                grad.addColorStop(0.1, '#330066');
                grad.addColorStop(0.3, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Singularity Sparkle
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath(); ctx.arc(cx + rand(-50, 50), cy + rand(-50, 50), rand(1, 3), 0, Math.PI * 2); ctx.fill();
                }

                ctx.restore();

                // Black Hole Center
                let bhGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 150);
                bhGrad.addColorStop(0, '#000');
                bhGrad.addColorStop(0.7, '#000');
                bhGrad.addColorStop(0.75, '#fff');
                bhGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = bhGrad;
                ctx.beginPath(); ctx.arc(cx, cy, 150, 0, Math.PI * 2); ctx.fill();

                // Title
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 70px 'Montserrat', sans-serif";
                ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + Math.sin(Date.now() * 0.003) * 0.05})`;
                ctx.fillText('EVENT HORIZON', canvas.width / 2, canvas.height * 0.15);

            } else if (isGlitchActive) {
                // === SYSTEM OVERRIDE RENDERING ===
                let gliFighter = fighters.find(f => f.glitchState && f.glitchState !== 'done');

                // Glitch the Original Background (Horizontal Displacement Bars)
                for (let i = 0; i < 8; i++) {
                    if (Math.random() < 0.4) {
                        let gy = rand(0, canvas.height);
                        let gh = rand(2, 60);
                        let color = Math.random() < 0.5 ? 'rgba(0, 255, 255, 0.1)' : 'rgba(255, 0, 255, 0.1)';
                        ctx.fillStyle = color;
                        ctx.fillRect(0, gy, canvas.width, gh);
                        // Vertical static jitter
                        if (Math.random() < 0.2) {
                            ctx.fillStyle = '#0f0';
                            ctx.fillRect(rand(0, canvas.width), gy, rand(5, 50), gh);
                        }
                    }
                }


                // 3D Digital Abyss Grid
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)'; ctx.lineWidth = 1;
                let horizonY = canvas.height * 0.4;
                let tilt = Math.sin(Date.now() * 0.001) * 100;
                for (let i = -canvas.width; i < canvas.width * 2; i += 80) {
                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2 + tilt, horizonY);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < 10; i++) {
                    let gy = horizonY + Math.pow(i / 10, 2) * (canvas.height - horizonY);
                    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
                }


                // Digital Tearing
                if (Math.random() < 0.2) {
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                    ctx.fillRect(0, rand(0, canvas.height), canvas.width, rand(5, 50));
                }

                // Terminal Text Rain
                ctx.fillStyle = '#0f0';
                ctx.font = "900 16px 'Courier New'";
                for (let i = 0; i < 40; i++) {
                    let rx = (i * 40 + Date.now() * 0.02) % canvas.width;
                    let ry = (Date.now() * 0.2 + i * 50) % canvas.height;
                    let char = Math.random() > 0.8 ? "SEG_FAULT" : (Math.random() > 0.5 ? "1" : "0");
                    ctx.fillText(char, rx, ry);
                }

                // System Flicker & Extra Noise
                if (Math.random() < 0.15) {
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    triggerShake(5);
                }
                if (Math.random() < 0.1) {
                    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 1;
                    let glY = rand(0, canvas.height);
                    ctx.beginPath(); ctx.moveTo(0, glY); ctx.lineTo(canvas.width, glY); ctx.stroke();
                }

                // CRT Scanlines
                ctx.fillStyle = 'rgba(0, 255, 0, 0.05)';
                for (let i = 0; i < canvas.height; i += 4) {
                    ctx.fillRect(0, i, canvas.width, 1);
                }

                // Title & Progress Bar
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 70px 'Montserrat', sans-serif";
                ctx.fillStyle = `rgba(0, 255, 0, ${0.15 + Math.sin(Date.now() * 0.007) * 0.05})`;
                ctx.fillText('SYSTEM OVERRIDE', canvas.width / 2, canvas.height * 0.15);

                // Glitching Progress Bar
                let barW = 400; let barH = 20;
                let barX = canvas.width / 2 - barW / 2; let barY = canvas.height * 0.22;
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barW, barH);
                let progress = (Date.now() % 2000) / 2000;
                ctx.fillStyle = '#0f0'; ctx.fillRect(barX + 2, barY + 2, (barW - 4) * progress, barH - 4);
                if (Math.random() < 0.3) {
                    ctx.fillStyle = '#f0f'; ctx.fillRect(barX + rand(0, barW), barY, rand(10, 30), barH);
                }

                // Digital Popups
                if (Math.random() < 0.1) {
                    effects.push(new GlitchPopup(rand(100, canvas.width - 100), rand(100, canvas.height - 100), ["KERNEL PANIC", "BIT FLIP", "ID_COLLISION", "OVERFLOW"][Math.floor(rand(0, 4))]));
                }

                // Draw popups during domain
                effects.forEach(e => { if (e.type === 'glitch_popup') e.draw(ctx); });



            } else if (isInfernoActive) {
                // === INFERNO REALM RENDERING (OPTIMIZED) ===
                let infFighter = fighters.find(f => f.infernoState && f.infernoState !== 'done');
                let infTick = infFighter ? infFighter.infernoTick : 0;
                let infState = infFighter ? infFighter.infernoState : '';
                let lavaY = canvas.height - (infFighter ? infFighter.lavaLevel : 0);

                // Volcanic sky
                ctx.fillStyle = '#150000';
                ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);

                // Static Heat Overlay (Cheaper than gradient)
                ctx.fillStyle = 'rgba(255, 30, 0, 0.12)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Embers (Background - Reduced Count)
                ctx.fillStyle = '#ff6600';
                for (let i = 0; i < 8; i++) {

                // Draw "NATIONAL DEBATE" text on background
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 80px 'Montserrat', sans-serif";
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillText('NATIONAL DEBATE', canvas.width / 2, canvas.height * 0.3);

                let elecPol = fighters.find(f => f.electionState && f.electionState !== 'done');
                if (elecPol && elecPol.electionState === 'active') {
                    // Confetti rain
                    if (Math.random() < 0.3) {
                        particles.push(new Particle(rand(0, canvas.width), rand(-50, 0), ['#ff0000', '#ffffff', '#0000ff'][Math.floor(rand(0, 3))], 0, 120, rand(4, 8), false, 'square', true));
                    }
                }

                // Draw Podiums
                fighters.forEach(f => {
                    let podX = f.x;
                    let podY = canvas.height * 0.6 + f.r; // Draw podium just below the character

                    ctx.fillStyle = '#1a365d';
                    ctx.fillRect(podX - 35, podY - 10, 70, 70);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    ctx.strokeRect(podX - 35, podY - 10, 70, 70);
                    // Draw mic
                    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(podX, podY - 10); ctx.lineTo(podX, podY - 30); ctx.stroke();
                    ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(podX, podY - 30, 6, 0, Math.PI * 2); ctx.fill();

                    if (elecPol) {
                        let votes = f.electionVotes || 0;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                        ctx.font = "900 24px 'Montserrat', sans-serif";
                        ctx.fillStyle = '#fff';
                        ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
                        let textY = podY + 50;
                        ctx.strokeText(`VOTES: ${Math.floor(votes)}`, podX, textY);
                        ctx.fillText(`VOTES: ${Math.floor(votes)}`, podX, textY);

                        // Poll Meter above head
                        let totalVotes = fighters[0].electionVotes + (fighters[1] ? fighters[1].electionVotes : 0) || 1;
                        let ratio = votes / totalVotes;
                        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(f.x - 40, f.y - 80, 80, 10);
                        ctx.fillStyle = f.color; ctx.fillRect(f.x - 40, f.y - 80, 80 * ratio, 10);
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(f.x - 40, f.y - 80, 80, 10);
                    }
                });

                // Breaking News Ticker
                ctx.fillStyle = '#000'; ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
                ctx.fillStyle = '#fff'; ctx.font = "900 20px 'Montserrat'";
                let tickerTxt = "--- BREAKING NEWS: ELECTION POLLS CLOSING SOON --- ECONOMY STABLE --- DEBATE INTENSIFIES --- ";
                let txtW = ctx.measureText(tickerTxt).width;
                let offset = (Date.now() * 0.1) % txtW;
                ctx.fillText(tickerTxt, -offset, canvas.height - 15);
                ctx.fillText(tickerTxt, txtW - offset, canvas.height - 15);

                ctx.fillStyle = '#ff0000'; ctx.fillRect(0, canvas.height - 40, 100, 40);
                ctx.fillStyle = '#fff'; ctx.fillText("LIVE", 20, canvas.height - 15);

                // Voter Spotlight on Lead
                let leader = fighters[0].electionVotes > (fighters[1] ? fighters[1].electionVotes : 0) ? fighters[0] : fighters[1];
                if (leader) {
                    let sGrad = ctx.createRadialGradient(leader.x, leader.y, 20, leader.x, leader.y, 150);
                    sGrad.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
                    sGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = sGrad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }


            } else if (isDragRaceActive) {
                // Dark background
                ctx.fillStyle = '#0a0515';
                ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);

                // Synthwave City Skyline
                ctx.fillStyle = '#1c0a2e';
                for (let i = 0; i < 12; i++) {
                    let bW = 80 + (i % 3) * 20;
                    ctx.fillRect(i * 100, canvas.height * 0.1, bW, canvas.height * 0.2);
                    // Windows
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                    if (i % 2 === 0) {
                        for (let wy = canvas.height * 0.15; wy < canvas.height * 0.3; wy += 25) {
                            ctx.fillRect(i * 100 + 20, wy, 15, 15); ctx.fillRect(i * 100 + bW - 35, wy, 15, 15);
                        }
                    }
                    ctx.fillStyle = '#1c0a2e';
                }

                // Neon Grid Horizon
                ctx.strokeStyle = 'rgba(255, 0, 85, 0.4)';
                ctx.lineWidth = 2;
                for (let i = -5; i < 6; i++) {
                    ctx.beginPath(); ctx.moveTo(canvas.width / 2 + i * 200, canvas.height * 0.3); ctx.lineTo(canvas.width / 2 + i * 800, canvas.height * 0.5); ctx.stroke();
                }

                // Asphalt road
                let roadY1 = canvas.height * 0.3;
                let roadH = canvas.height * 0.55;
                ctx.fillStyle = '#222';
                ctx.fillRect(0, roadY1, canvas.width, roadH);

                let drFighter = fighters.find(f => f.dragRaceState && f.dragRaceState !== 'done');
                let isRacing = drFighter && drFighter.dragRaceState === 'racing';
                let roadOffset = isRacing ? (Date.now() * 0.8) % 80 : 0;
                let dashOffset = isRacing ? (Date.now() * 1.2) % 60 : 0;

                // Road texture lines
                for (let x = -roadOffset; x < canvas.width; x += 80) {
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    ctx.fillRect(x, roadY1, 40, roadH);
                }

                // Lane divider (dashed)
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 6;
                ctx.setLineDash([40, 40]);
                ctx.beginPath();
                ctx.moveTo(-dashOffset, canvas.height * 0.57);
                ctx.lineTo(canvas.width + 80, canvas.height * 0.57);
                ctx.stroke();
                ctx.setLineDash([]);

                // Motion Blur / Speed Lines
                if (isRacing) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 15; i++) {
                        let ly = roadY1 + rand(20, roadH - 20);
                        let lw = rand(100, 400);
                        let lx = rand(0, canvas.width);
                        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx - lw, ly); ctx.stroke();
                    }
                }

                // Top and bottom road borders
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(0, roadY1, canvas.width, 6);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, roadY1 + 6, canvas.width, 3);
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(0, roadY1 + roadH - 6, canvas.width, 6);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, roadY1 + roadH - 9, canvas.width, 3);

                // Finish line
                let finishX = canvas.width * 0.85;
                for (let iy = 0; iy < roadH; iy += 15) {
                    for (let ix = 0; ix < 30; ix += 15) {
                        ctx.fillStyle = ((Math.floor(iy / 15) + Math.floor(ix / 15)) % 2 === 0) ? '#fff' : '#000';
                        ctx.fillRect(finishX + ix, roadY1 + iy, 15, 15);
                    }
                }

                // "DRAG RACE" on road
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 60px 'Montserrat', sans-serif";
                ctx.fillStyle = 'rgba(255, 0, 85, 0.08)';
                ctx.fillText('DRAG RACE', canvas.width / 2, canvas.height * 0.57);

                // Countdown traffic lights
                let raceDriver = fighters.find(f => f.dragRaceState && f.dragRaceState !== 'done');
                if (raceDriver && raceDriver.dragRaceState === 'countdown') {
                    let lightX = canvas.width / 2;
                    let lightY = canvas.height * 0.15;
                    // Housing
                    ctx.fillStyle = '#222'; ctx.strokeStyle = '#555'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.roundRect(lightX - 30, lightY - 25, 60, 80, 8); ctx.fill(); ctx.stroke();
                    // Red
                    ctx.beginPath(); ctx.arc(lightX, lightY - 10, 10, 0, Math.PI * 2);
                    ctx.fillStyle = raceDriver.dragRaceTick >= 40 ? '#ff0000' : '#330000'; ctx.fill();
                    // Yellow
                    ctx.beginPath(); ctx.arc(lightX, lightY + 15, 10, 0, Math.PI * 2);
                    ctx.fillStyle = raceDriver.dragRaceTick >= 80 ? '#ffcc00' : '#332200'; ctx.fill();
                    // Green
                    ctx.beginPath(); ctx.arc(lightX, lightY + 40, 10, 0, Math.PI * 2);
                    ctx.fillStyle = raceDriver.dragRaceTick >= 120 ? '#00ff00' : '#003300'; ctx.fill();
                }

                // Speed lines during racing
                if (raceDriver && raceDriver.dragRaceState === 'racing') {
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
                    for (let i = 0; i < 8; i++) {
                        let ly = rand(roadY1 + 10, roadY1 + roadH - 10);
                        let lx = rand(0, canvas.width);
                        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx - rand(40, 120), ly); ctx.stroke();
                    }
                }
            } else if (isBlackJackActive) {
                // Draw dark background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);

                // Draw casino felt table
                let tableX = canvas.width * 0.1;
                let tableY = canvas.height * 0.35;
                let tableW = canvas.width * 0.8;
                let tableH = canvas.height * 0.55;
                let tableR = 30;

                // Table shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.roundRect(tableX + 5, tableY + 5, tableW, tableH, tableR);
                ctx.fill();

                // Table body (green felt)
                let feltGrad = ctx.createRadialGradient(canvas.width / 2, tableY + tableH / 2, 50, canvas.width / 2, tableY + tableH / 2, tableW / 1.5);
                feltGrad.addColorStop(0, '#1a7a3a');
                feltGrad.addColorStop(1, '#0d4d22');
                ctx.fillStyle = feltGrad;
                ctx.beginPath();
                ctx.roundRect(tableX, tableY, tableW, tableH, tableR);
                ctx.fill();

                // Table border (wood)
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.roundRect(tableX, tableY, tableW, tableH, tableR);
                ctx.stroke();
                ctx.strokeStyle = '#A0522D';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.roundRect(tableX, tableY, tableW, tableH, tableR);
                ctx.stroke();

                // Inner felt line
                ctx.strokeStyle = 'rgba(255,215,0,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(tableX + 15, tableY + 15, tableW - 30, tableH - 30, tableR - 5);
                ctx.stroke();

                // Center divider line
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, tableY + 20);
                ctx.lineTo(canvas.width / 2, tableY + tableH - 20);
                ctx.stroke();
                ctx.setLineDash([]);

                // "BLACKJACK" text on table
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = "900 48px 'Montserrat', sans-serif";
                ctx.fillStyle = 'rgba(255, 215, 0, 0.12)';
                ctx.fillText('BLACKJACK', canvas.width / 2, tableY + tableH / 2 + 40);

                // Gold coin rain
                if (Math.random() < 0.3) {
                    particles.push(new Particle(rand(0, canvas.width), rand(-50, 0), '#ffd700', 0, 120, rand(4, 8), true, 'circle', true));
                }
            }

            const domainStates = ['blackJackState', 'infernoState', 'glitchState', 'gravityState', 'dragRaceState',
                'electionState', 'dojoState', 'mineState', 'bumpState', 'shriekState',
                'bloodMoonState', 'killshotState', 'brawlState'];
            const inDomain = [p1, p2].some(f => f && (domainStates.some(s => f[s] && f[s] !== 'done') || f.domainEntranceTick > 0));

            if (hitStopFrames > 0) {
                hitStopFrames--;
            } else {
                if (p1) p1.update(fighters);
                if (p2) p2.update(fighters);
                resolveFighterCollisions();

                if (!inDomain) {
                    projectiles.forEach(p => p.update(fighters));
                    shockwaves.forEach(s => s.update(fighters));
                    effects.forEach(e => e.update(fighters));
                }


                particles.forEach(p => p.update());
                floatingTexts.forEach(t => t.update());
                actionWords.forEach(a => a.update());

                updateUIAndState();

                projectiles = projectiles.filter(p => p.active);
                shockwaves = shockwaves.filter(s => s.radius < s.maxRadius);
                effects = effects.filter(e => e.life > 0);
                particles = particles.filter(p => p.life > 0);
                floatingTexts = floatingTexts.filter(t => t.life > 0);
                actionWords = actionWords.filter(a => a.life > 0);
            }

            if (!inDomain) {
                effects.forEach(e => e.draw(ctx));
                projectiles.forEach(p => p.draw(ctx));
                shockwaves.forEach(s => s.draw(ctx));
            }

            if (p1) p1.draw(ctx);
            if (p2) p2.draw(ctx);

            particles.forEach(p => p.draw(ctx));
            floatingTexts.forEach(t => t.draw(ctx));
            actionWords.forEach(a => a.draw(ctx));

            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        // State Management
        function initLoading() {
            let progress = 0;
            const fill = document.getElementById('loaderFill');
            const status = document.getElementById('loaderStatus');
            const statuses = ["INKING CHARACTERS...", "SHADING DOMAINS...", "RENDERING VFX...", "PREPARING PANELS...", "READY!"];

            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                        document.getElementById('mainMenu').style.display = 'flex';
                    }, 500);
                }
                fill.style.width = progress + "%";
                status.innerText = statuses[Math.floor((progress / 100) * (statuses.length - 1))];
            }, 100);
        }

        function enterArena() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            startMatch();
        }

        // Settings Logic
        function openSettings() { document.getElementById('settingsMenu').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsMenu').style.display = 'none'; }
        function applySettings() {
            const logoText = document.getElementById('setLogoText').value;
            const fontStyle = document.getElementById('setFontStyle').value;
            const uiColor = document.getElementById('setUiColor').value;
            const shakeEnabled = document.getElementById('setShake').checked;

            // Update Title
            document.getElementById('menuLogo').innerHTML = logoText.replace(" ", "<br>");

            // Update Fonts
            document.documentElement.style.setProperty('--font-primary', fontStyle);
            document.body.style.fontFamily = fontStyle;

            // Update Colors
            document.documentElement.style.setProperty('--ui-accent', uiColor);
            const playBtn = document.querySelector('.play-btn');
            if (playBtn) playBtn.style.background = uiColor;

            // Global Settings
            window.gameSettings = { shakeEnabled };

            closeSettings();
        }

        // Init
        initLoading();
        gameLoop();


    </script>
</body>

</html>
